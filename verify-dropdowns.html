<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Verification</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        .dropdown-test { margin: 10px 0; }
        select { margin: 5px; padding: 5px; }
    </style>
</head>
<body>
    <h1>Dropdown Population Verification</h1>
    
    <div class="test-section">
        <h2>Test Dropdowns</h2>
        
        <div class="dropdown-test">
            <label>Products:</label>
            <select id="productSelect">
                <option value="">Loading...</option>
            </select>
            <span id="productCount"></span>
        </div>
        
        <div class="dropdown-test">
            <label>Categories:</label>
            <select id="categorySelect">
                <option value="">Loading...</option>
            </select>
            <span id="categoryCount"></span>
        </div>
        
        <div class="dropdown-test">
            <label>Salespeople:</label>
            <select id="salespersonSelect">
                <option value="">Loading...</option>
            </select>
            <span id="salespersonCount"></span>
        </div>
        
        <div class="dropdown-test">
            <label>Price Lists:</label>
            <select id="priceListSelect">
                <option value="">Loading...</option>
            </select>
            <span id="priceListCount"></span>
        </div>
    </div>

    <div class="test-section">
        <h2>Test Results</h2>
        <div id="results"></div>
    </div>

    <script src="js/local-fallback-manager.js"></script>
    <script src="js/universal-firebase-data-manager.js"></script>
    
    <script>
        async function verifyDropdowns() {
            const results = document.getElementById('results');
            
            function log(message, type = 'info') {
                const div = document.createElement('div');
                div.className = type;
                div.innerHTML = message;
                results.appendChild(div);
                console.log(message);
            }
            
            try {
                log('<h3>Initializing Data Manager...</h3>');
                
                // Clear local storage to force API fallback
                localStorage.clear();
                
                const dataManager = new UniversalFirebaseDataManager();
                await dataManager.autoInitialize();
                log('✓ Data manager initialized', 'success');
                
                // Test each data type
                log('<h3>Loading Data...</h3>');
                
                const products = await dataManager.getProducts();
                const categories = await dataManager.getCategories();
                const salespeople = await dataManager.getSalespeople();
                const priceLists = await dataManager.getPriceLists();
                
                // Populate dropdowns and show counts
                populateDropdown('productSelect', products, 'productCount');
                populateDropdown('categorySelect', categories, 'categoryCount');
                populateDropdown('salespersonSelect', salespeople, 'salespersonCount');
                populateDropdown('priceListSelect', priceLists, 'priceListCount');
                
                // Log results
                log(`Products loaded: ${products ? products.length : 0}`, products && products.length > 0 ? 'success' : 'error');
                log(`Categories loaded: ${categories ? categories.length : 0}`, categories && categories.length > 0 ? 'success' : 'error');
                log(`Salespeople loaded: ${salespeople ? salespeople.length : 0}`, salespeople && salespeople.length > 0 ? 'success' : 'error');
                log(`Price lists loaded: ${priceLists ? priceLists.length : 0}`, priceLists && priceLists.length > 0 ? 'success' : 'error');
                
                // Overall result
                const allLoaded = products && products.length > 0 && 
                                categories && categories.length > 0 && 
                                salespeople && salespeople.length > 0 && 
                                priceLists && priceLists.length > 0;
                
                log(`<h3>Overall Result: ${allLoaded ? '✓ SUCCESS - All dropdowns populated' : '✗ FAILED - Some dropdowns empty'}</h3>`, 
                    allLoaded ? 'success' : 'error');
                
            } catch (error) {
                log(`✗ Test failed: ${error.message}`, 'error');
                console.error('Test error:', error);
            }
        }
        
        function populateDropdown(selectId, data, countId) {
            const select = document.getElementById(selectId);
            const countSpan = document.getElementById(countId);
            
            select.innerHTML = '<option value="">Select...</option>';
            
            if (data && data.length > 0) {
                data.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.id || item.name || item.title;
                    option.textContent = item.name || item.title || item.id;
                    select.appendChild(option);
                });
                countSpan.textContent = `(${data.length} items)`;
                countSpan.className = 'success';
            } else {
                countSpan.textContent = '(0 items)';
                countSpan.className = 'error';
            }
        }
        
        // Run verification when page loads
        window.addEventListener('load', () => {
            setTimeout(verifyDropdowns, 1000);
        });
    </script>
</body>
</html>
