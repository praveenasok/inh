<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Dropdown Integration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .data-info {
            background-color: #f8f9fa;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>Dropdown Integration Test</h1>
    
    <div class="test-section">
        <h2>Manager Status</h2>
        <div id="manager-status"></div>
    </div>

    <div class="test-section">
        <h2>Data Availability</h2>
        <div id="data-status"></div>
        <button onclick="checkDataAvailability()">Check Data</button>
    </div>

    <div class="test-section">
        <h2>Dropdown Tests</h2>
        <div>
            <label>Price List:</label>
            <select id="priceListSelect"></select>
            <button onclick="testPriceListDropdown()">Test Price List</button>
        </div>
        <div>
            <label>Client:</label>
            <select id="clientSelect"></select>
            <button onclick="testClientDropdown()">Test Client</button>
        </div>
        <div>
            <label>Salesperson:</label>
            <select id="salespersonSelect"></select>
            <button onclick="testSalespersonDropdown()">Test Salesperson</button>
        </div>
        <div id="dropdown-results"></div>
    </div>

    <div class="test-section">
        <h2>Storage Keys Test</h2>
        <div id="storage-keys"></div>
        <button onclick="checkStorageKeys()">Check Storage Keys</button>
    </div>

    <!-- Include necessary scripts -->
    <script src="js/local-fallback-manager.js"></script>
    <script src="js/local-storage-dropdown-manager.js"></script>

    <script>
        let testResults = {};

        async function checkManagerStatus() {
            const statusDiv = document.getElementById('manager-status');
            let html = '';

            // Check LocalFallbackManager
            if (window.localFallbackManager) {
                html += '<div class="status success">✅ LocalFallbackManager: Available</div>';
                try {
                    await window.localFallbackManager.ensureInitialized();
                    html += '<div class="status success">✅ LocalFallbackManager: Initialized</div>';
                } catch (e) {
                    html += `<div class="status error">❌ LocalFallbackManager Init Error: ${e.message}</div>`;
                }
            } else {
                html += '<div class="status error">❌ LocalFallbackManager: Not Available</div>';
            }

            // Check LocalStorageDropdownManager
            if (window.localStorageDropdownManager) {
                html += '<div class="status success">✅ LocalStorageDropdownManager: Available</div>';
                try {
                    await window.localStorageDropdownManager.initialize();
                    html += '<div class="status success">✅ LocalStorageDropdownManager: Initialized</div>';
                } catch (e) {
                    html += `<div class="status error">❌ LocalStorageDropdownManager Init Error: ${e.message}</div>`;
                }
            } else {
                html += '<div class="status error">❌ LocalStorageDropdownManager: Not Available</div>';
            }

            statusDiv.innerHTML = html;
        }

        async function checkDataAvailability() {
            const statusDiv = document.getElementById('data-status');
            let html = '';

            const collections = ['products', 'clients', 'salespeople'];
            
            for (const collection of collections) {
                try {
                    // Check LocalFallbackManager
                    let fallbackData = null;
                    if (window.localFallbackManager) {
                        fallbackData = await window.localFallbackManager.getData(collection);
                    }

                    // Check LocalStorageDropdownManager
                    let dropdownData = null;
                    if (window.localStorageDropdownManager) {
                        dropdownData = await window.localStorageDropdownManager.getData(collection);
                    }

                    html += `<div class="data-info">
                        <strong>${collection}:</strong><br>
                        LocalFallbackManager: ${fallbackData ? fallbackData.length + ' items' : 'No data'}<br>
                        LocalStorageDropdownManager: ${dropdownData ? dropdownData.length + ' items' : 'No data'}
                    </div>`;

                } catch (error) {
                    html += `<div class="status error">❌ Error checking ${collection}: ${error.message}</div>`;
                }
            }

            statusDiv.innerHTML = html;
        }

        async function testPriceListDropdown() {
            const select = document.getElementById('priceListSelect');
            const resultsDiv = document.getElementById('dropdown-results');
            
            try {
                if (window.localStorageDropdownManager) {
                    const count = await window.localStorageDropdownManager.populatePriceListDropdown(select);
                    resultsDiv.innerHTML = `<div class="status success">✅ Price List populated with ${count} options</div>`;
                } else {
                    resultsDiv.innerHTML = '<div class="status error">❌ LocalStorageDropdownManager not available</div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="status error">❌ Error populating price list: ${error.message}</div>`;
            }
        }

        async function testClientDropdown() {
            const select = document.getElementById('clientSelect');
            const resultsDiv = document.getElementById('dropdown-results');
            
            try {
                if (window.localStorageDropdownManager) {
                    const count = await window.localStorageDropdownManager.populateClientDropdown(select);
                    resultsDiv.innerHTML = `<div class="status success">✅ Client dropdown populated with ${count} options</div>`;
                } else {
                    resultsDiv.innerHTML = '<div class="status error">❌ LocalStorageDropdownManager not available</div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="status error">❌ Error populating client dropdown: ${error.message}</div>`;
            }
        }

        async function testSalespersonDropdown() {
            const select = document.getElementById('salespersonSelect');
            const resultsDiv = document.getElementById('dropdown-results');
            
            try {
                if (window.localStorageDropdownManager) {
                    const count = await window.localStorageDropdownManager.populateSalespersonDropdown(select);
                    resultsDiv.innerHTML = `<div class="status success">✅ Salesperson dropdown populated with ${count} options</div>`;
                } else {
                    resultsDiv.innerHTML = '<div class="status error">❌ LocalStorageDropdownManager not available</div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="status error">❌ Error populating salesperson dropdown: ${error.message}</div>`;
            }
        }

        function checkStorageKeys() {
            const keysDiv = document.getElementById('storage-keys');
            let html = '<h3>LocalStorage Keys:</h3>';
            
            const relevantKeys = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.includes('fallback_data_') || key.includes('products') || key.includes('clients') || key.includes('salespeople')) {
                    relevantKeys.push(key);
                }
            }

            if (relevantKeys.length > 0) {
                relevantKeys.forEach(key => {
                    const value = localStorage.getItem(key);
                    let dataLength = 'Invalid JSON';
                    try {
                        const parsed = JSON.parse(value);
                        dataLength = Array.isArray(parsed) ? `${parsed.length} items` : 'Object';
                    } catch (e) {
                        dataLength = `${value.length} chars`;
                    }
                    html += `<div class="data-info"><strong>${key}:</strong> ${dataLength}</div>`;
                });
            } else {
                html += '<div class="status info">No relevant storage keys found</div>';
            }

            keysDiv.innerHTML = html;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async function() {
            await checkManagerStatus();
            await checkDataAvailability();
            checkStorageKeys();
        });
    </script>
</body>
</html>
