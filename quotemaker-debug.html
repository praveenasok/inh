<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Maker - Debug Version</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>
    
    <!-- Firebase Configuration -->
    <script src="firebase-config.js"></script>
    <!-- Firebase global initialization -->
    <script src="firebase-global-init.js"></script>
    
    <!-- Firebase Database Service -->
    <script src="firebase-database.js"></script>
    <script src="google-sheets-config.js"></script>
    
    <!-- Firebase Error Handler -->
    <script src="firebase-error-handler.js"></script>
    
    <!-- Universal Firebase Data Manager -->
    <script src="js/universal-firebase-data-manager.js"></script>
    
    <!-- Fallback System Components -->
    <script src="js/local-fallback-manager.js"></script>
    <script src="js/fallback-detector.js"></script>
    <script src="js/unified-data-access.js"></script>
    
    <script src="client-management.js"></script>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto p-6">
        <h1 class="text-3xl font-bold mb-6">Quote Maker - Debug Version</h1>
        
        <!-- Debug Status -->
        <div id="debug-status" class="mb-6 p-4 bg-blue-50 border border-blue-200 rounded">
            <h3 class="font-semibold mb-2">Debug Status:</h3>
            <div id="status-messages"></div>
        </div>
        
        <!-- Dropdowns Section -->
        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="text-xl font-semibold mb-4">Product Selection</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label for="price-list-selector" class="block text-sm font-medium text-gray-700 mb-2">Price List</label>
                    <select id="price-list-selector" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Select Price List</option>
                    </select>
                </div>
                
                <div>
                    <label for="category-selector" class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                    <select id="category-selector" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Select Category</option>
                    </select>
                </div>
                
                <div>
                    <label for="product-selector" class="block text-sm font-medium text-gray-700 mb-2">Product</label>
                    <select id="product-selector" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Select Product</option>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- Debug Controls -->
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-semibold mb-4">Debug Controls</h2>
            <div class="space-x-4">
                <button onclick="testDataLoading()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Test Data Loading</button>
                <button onclick="testDropdownPopulation()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Test Dropdown Population</button>
                <button onclick="clearStatus()" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">Clear Status</button>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let productData = [];
        let clientData = [];
        let salesmenData = [];
        let stylesData = [];
        let colorsData = [];
        
        function addStatusMessage(message, type = 'info') {
            const statusDiv = document.getElementById('status-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `mb-2 p-2 rounded ${type === 'error' ? 'bg-red-100 text-red-800' : type === 'success' ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800'}`;
            messageDiv.textContent = new Date().toLocaleTimeString() + ': ' + message;
            statusDiv.appendChild(messageDiv);
            console.log(message);
        }
        
        function clearStatus() {
            document.getElementById('status-messages').innerHTML = '';
        }
        
        async function testDataLoading() {
            addStatusMessage('Starting data loading test...');
            
            try {
                // Wait for data manager to be ready
                let attempts = 0;
                while (!window.universalDataManager && attempts < 50) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    attempts++;
                }
                
                if (!window.universalDataManager) {
                    addStatusMessage('ERROR: universalDataManager not available', 'error');
                    return;
                }
                
                addStatusMessage('Data manager available, checking if ready...');
                
                // Wait for data manager to be ready
                attempts = 0;
                while (!window.universalDataManager.isReady() && attempts < 50) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    attempts++;
                }
                
                if (!window.universalDataManager.isReady()) {
                    addStatusMessage('ERROR: Data manager not ready', 'error');
                    return;
                }
                
                addStatusMessage('Data manager ready, loading products...');
                
                // Load products
                productData = await window.universalDataManager.getProducts();
                
                addStatusMessage('Products loaded: ' + productData.length + ' items', 'success');
                
                if (productData.length > 0) {
                    const firstProduct = productData[0];
                    addStatusMessage('First product fields: ' + Object.keys(firstProduct).join(', '));
                    
                    // Check for PriceList field
                    if (firstProduct.PriceList) {
                        addStatusMessage('PriceList field found: ' + firstProduct.PriceList, 'success');
                    } else if (firstProduct.priceList) {
                        addStatusMessage('priceList field found: ' + firstProduct.priceList, 'success');
                    } else {
                        addStatusMessage('No PriceList/priceList field found', 'error');
                    }
                }
                
            } catch (error) {
                addStatusMessage('ERROR loading data: ' + error.message, 'error');
            }
        }
        
        function testDropdownPopulation() {
            addStatusMessage('Testing dropdown population...');
            
            if (!productData || productData.length === 0) {
                addStatusMessage('ERROR: No product data available. Run data load test first.', 'error');
                return;
            }
            
            const priceListSelector = document.getElementById('price-list-selector');
            if (!priceListSelector) {
                addStatusMessage('ERROR: price-list-selector not found', 'error');
                return;
            }
            
            // Clear existing options
            priceListSelector.innerHTML = '<option value="">Select Price List</option>';
            
            // Extract unique price lists
            const priceLists = [...new Set(productData
                .map(product => product.PriceList || product.priceList)
                .filter(priceList => priceList && priceList.trim() !== ''))];
            
            addStatusMessage('Found ' + priceLists.length + ' unique price lists: ' + priceLists.join(', '));
            
            // Populate dropdown
            priceLists.forEach(priceList => {
                const option = document.createElement('option');
                option.value = priceList;
                option.textContent = priceList;
                priceListSelector.appendChild(option);
            });
            
            addStatusMessage('Dropdown populated with ' + priceLists.length + ' options', 'success');
            
            // Test category population
            populateCategoryDropdown();
        }
        
        function populateCategoryDropdown() {
            const categorySelector = document.getElementById('category-selector');
            if (!categorySelector) return;
            
            // Clear existing options
            categorySelector.innerHTML = '<option value="">Select Category</option>';
            
            // Extract unique categories
            const categories = [...new Set(productData
                .map(product => product.Category || product.category)
                .filter(category => category && category.trim() !== ''))];
            
            addStatusMessage('Found ' + categories.length + ' unique categories: ' + categories.join(', '));
            
            // Populate dropdown
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categorySelector.appendChild(option);
            });
        }
        
        // Auto-initialize when page loads
        window.addEventListener('load', () => {
            addStatusMessage('Page loaded, waiting 2 seconds before auto-test...');
            setTimeout(() => {
                testDataLoading();
            }, 2000);
        });
    </script>
</body>
</html>
