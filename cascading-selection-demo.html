<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cascading Selection Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .row { margin-bottom: 12px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    select { width: 100%; padding: 8px; }
    .status { padding: 8px; border-radius: 6px; margin-top: 8px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #fff3cd; color: #856404; }
  </style>
</head>
<body>
  <h1>Cascading Selection Demo</h1>
  <p>This demo shows a simple cascading dropdown: Price List → Category → Subcategory, using existing data access utilities.</p>

  <div class="grid">
    <div class="row">
      <label for="price-list">Price List</label>
      <select id="price-list">
        <option value="">Loading...</option>
      </select>
      <div id="price-list-status" class="status info">Initializing...</div>
    </div>

    <div class="row">
      <label for="category">Category</label>
      <select id="category" disabled>
        <option value="">Select a price list first</option>
      </select>
      <div id="category-status" class="status info">Waiting for parent selection...</div>
    </div>

    <div class="row">
      <label for="subcategory">Subcategory</label>
      <select id="subcategory" disabled>
        <option value="">Select a category first</option>
      </select>
      <div id="subcategory-status" class="status info">Waiting for parent selection...</div>
    </div>
  </div>

  <div class="row">
    <label for="debug">Debug Output</label>
    <pre id="debug" style="background:#f7f7f7; padding:12px; border-radius:6px; max-height:300px; overflow:auto;"></pre>
  </div>

  <!-- Include required scripts -->
  <script src="firebase-config.js"></script>
  <script src="js/universal-firebase-data-manager.js"></script>
  <script src="js/unified-data-access.js"></script>

  <script>
    const els = {
      priceList: document.getElementById('price-list'),
      category: document.getElementById('category'),
      subcategory: document.getElementById('subcategory'),
      status: {
        priceList: document.getElementById('price-list-status'),
        category: document.getElementById('category-status'),
        subcategory: document.getElementById('subcategory-status'),
      },
      debug: document.getElementById('debug')
    };

    function setStatus(id, message, type = 'info') {
      els.status[id].className = `status ${type}`;
      els.status[id].textContent = message;
    }

    function setOptions(selectEl, options, placeholder = 'Select...') {
      selectEl.innerHTML = '';
      const ph = document.createElement('option');
      ph.value = '';
      ph.textContent = placeholder;
      selectEl.appendChild(ph);
      options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt;
        o.textContent = opt;
        selectEl.appendChild(o);
      });
    }

    async function ensureManagersReady() {
      // Wait for universalDataManager
      let attempts = 0;
      while (!window.universalDataManager && attempts < 40) {
        await new Promise(r => setTimeout(r, 250));
        attempts++;
      }
      if (!window.universalDataManager) throw new Error('Universal Data Manager not available');

      // Wait until ready
      try { await window.universalDataManager.waitForReady(); } catch {}

      // Initialize unifiedDataAccess if present
      if (!window.unifiedDataAccess) {
        try { window.unifiedDataAccess = new UnifiedDataAccess(); } catch {}
      }
      if (window.unifiedDataAccess && typeof window.unifiedDataAccess.ensureInitialized === 'function') {
        try { await window.unifiedDataAccess.ensureInitialized(); } catch {}
      }
    }

    async function loadPriceLists() {
      setStatus('priceList', 'Loading price lists...', 'info');
      let priceLists = [];
      let source = 'universalDataManager';
      try {
        priceLists = await window.universalDataManager.getPriceLists();
        if (!Array.isArray(priceLists) || priceLists.length === 0) throw new Error('No price lists');
      } catch (e) {
        // Fallback to extracting from products
        try {
          const products = await window.universalDataManager.getProducts();
          priceLists = [...new Set(products.map(p => p.PriceList || p.PriceListName || p['Price List Name']))].filter(Boolean).sort();
          source = 'products-derived';
        } catch (e2) {
          // Fallback: unifiedDataAccess
          try {
            priceLists = await window.unifiedDataAccess.getPriceLists();
            source = 'unifiedDataAccess';
          } catch (e3) {
            throw e3;
          }
        }
      }
      setOptions(els.priceList, priceLists, 'Select Price List');
      els.priceList.disabled = false;
      setStatus('priceList', `Loaded ${priceLists.length} price lists (${source})`, 'success');
      return priceLists;
    }

    async function loadCategories(priceList) {
      setStatus('category', 'Loading categories...', 'info');
      els.category.disabled = true;
      setOptions(els.category, [], 'Select a price list first');
      let categories = [];
      let source = 'unifiedDataAccess';
      try {
        categories = await window.unifiedDataAccess.getCategories(priceList);
        if (!Array.isArray(categories) || categories.length === 0) throw new Error('No categories');
      } catch (e) {
        // Fallback: derive from products
        try {
          const products = await window.universalDataManager.getProducts();
          categories = [...new Set(products
            .filter(p => {
              const pl = p.PriceList || p.PriceListName || p['Price List Name'] || p.priceList;
              return !priceList || pl === priceList;
            })
            .map(p => p.Category || p.category || p.ProductCategory)
          )].filter(Boolean).sort();
          source = 'products-derived';
        } catch (e2) {
          // Fallback: universalDataManager categories
          try {
            const derived = await window.universalDataManager.getCategories();
            categories = (derived || []).map(c => c.name || c.id || c);
            source = 'universalDataManager';
          } catch (e3) {
            throw e3;
          }
        }
      }
      setOptions(els.category, categories, 'Select Category');
      els.category.disabled = false;
      setStatus('category', `Loaded ${categories.length} categories (${source})`, 'success');
      return categories;
    }

    async function loadSubcategories(category, priceList) {
      setStatus('subcategory', 'Loading subcategories...', 'info');
      els.subcategory.disabled = true;
      setOptions(els.subcategory, [], 'Select a category first');
      let subs = [];
      let source = 'unifiedDataAccess';
      try {
        subs = await window.unifiedDataAccess.getSubcategories(category, priceList);
        if (!Array.isArray(subs) || subs.length === 0) throw new Error('No subcategories');
      } catch (e) {
        // Fallback: derive from products
        try {
          const products = await window.universalDataManager.getProducts();
          subs = [...new Set(products
            .filter(p => {
              const pl = p.PriceList || p.PriceListName || p['Price List Name'] || p.priceList;
              const cat = p.Category || p.category || p.ProductCategory;
              const matchesPL = !priceList || pl === priceList;
              const matchesCat = !category || cat === category;
              return matchesPL && matchesCat;
            })
            .map(p => p.Subcategory || p.subcategory || p.SubCategory)
          )].filter(Boolean).sort();
          source = 'products-derived';
        } catch (e2) {
          // Fallback: universalDataManager subcategories
          try {
            const derived = await window.universalDataManager.getSubcategories();
            subs = (derived || []).map(c => c.name || c.id || c);
            source = 'universalDataManager';
          } catch (e3) {
            throw e3;
          }
        }
      }
      setOptions(els.subcategory, subs, 'Select Subcategory');
      els.subcategory.disabled = false;
      setStatus('subcategory', `Loaded ${subs.length} subcategories (${source})`, 'success');
      return subs;
    }

    async function init() {
      try {
        setStatus('priceList', 'Initializing data managers...', 'info');
        await ensureManagersReady();
        await loadPriceLists();

        // Wire cascading events
        els.priceList.addEventListener('change', async (e) => {
          const priceList = e.target.value || '';
          els.category.disabled = true;
          els.subcategory.disabled = true;
          setOptions(els.category, [], priceList ? 'Loading categories...' : 'Select a price list first');
          setOptions(els.subcategory, [], 'Select a category first');
          setStatus('category', 'Loading categories...', 'info');
          setStatus('subcategory', 'Waiting for category...', 'info');
          if (priceList) {
            const cats = await loadCategories(priceList);
            els.category.focus();
          }
        });

        els.category.addEventListener('change', async (e) => {
          const category = e.target.value || '';
          const priceList = els.priceList.value || '';
          els.subcategory.disabled = true;
          setOptions(els.subcategory, [], category ? 'Loading subcategories...' : 'Select a category first');
          setStatus('subcategory', 'Loading subcategories...', 'info');
          if (category) {
            const subs = await loadSubcategories(category, priceList);
            els.subcategory.focus();
          }
        });

        // Debug current selections
        const debugSelections = () => {
          const dbg = {
            priceList: els.priceList.value || null,
            category: els.category.value || null,
            subcategory: els.subcategory.value || null,
            timestamp: new Date().toISOString()
          };
          els.debug.textContent = JSON.stringify(dbg, null, 2);
        };
        ['change', 'input'].forEach(evt => {
          els.priceList.addEventListener(evt, debugSelections);
          els.category.addEventListener(evt, debugSelections);
          els.subcategory.addEventListener(evt, debugSelections);
        });
        debugSelections();

      } catch (error) {
        setStatus('priceList', `Error: ${error.message}`, 'error');
        console.error('Cascading demo init error:', error);
      }
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
