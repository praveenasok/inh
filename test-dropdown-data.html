<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Data Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .warning { background-color: #fff3cd; color: #856404; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Dropdown Data Loading Test</h1>
    
    <div class="test-section">
        <h2>1. Check Data Manager Availability</h2>
        <div id="manager-status"></div>
    </div>
    
    <div class="test-section">
        <h2>2. Check Data Loading Status</h2>
        <div id="data-status"></div>
    </div>
    
    <div class="test-section">
        <h2>3. Test Product Data</h2>
        <div id="product-data"></div>
    </div>
    
    <div class="test-section">
        <h2>4. Test Price Lists</h2>
        <div id="price-lists"></div>
    </div>
    
    <div class="test-section">
        <h2>5. Test Categories</h2>
        <div id="categories"></div>
    </div>
    
    <div class="test-section">
        <h2>6. Console Logs</h2>
        <div id="console-logs"></div>
    </div>

    <!-- Include required scripts -->
    <script src="js/local-fallback-manager.js"></script>
    <script src="js/universal-firebase-data-manager.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-global-init.js"></script>

    <script>
        let logs = [];
        
        // Capture console logs
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        console.log = function(...args) {
            logs.push({type: 'log', message: args.join(' ')});
            originalLog.apply(console, args);
            updateConsoleLogs();
        };
        
        console.error = function(...args) {
            logs.push({type: 'error', message: args.join(' ')});
            originalError.apply(console, args);
            updateConsoleLogs();
        };
        
        console.warn = function(...args) {
            logs.push({type: 'warn', message: args.join(' ')});
            originalWarn.apply(console, args);
            updateConsoleLogs();
        };
        
        function updateConsoleLogs() {
            const logsDiv = document.getElementById('console-logs');
            logsDiv.innerHTML = '<pre>' + logs.slice(-20).map(log => 
                `[${log.type.toUpperCase()}] ${log.message}`
            ).join('\n') + '</pre>';
        }
        
        function updateStatus(elementId, message, type = 'success') {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="status ${type}">${message}</div>`;
        }
        
        async function runTests() {
            console.log('🔄 Starting dropdown data tests...');
            
            // Test 1: Check Data Manager Availability
            try {
                if (window.universalDataManager) {
                    updateStatus('manager-status', '✅ Universal Data Manager is available', 'success');
                    console.log('✅ Universal Data Manager found');
                } else {
                    updateStatus('manager-status', '❌ Universal Data Manager not available', 'error');
                    console.error('❌ Universal Data Manager not found');
                    return;
                }
            } catch (error) {
                updateStatus('manager-status', `❌ Error checking manager: ${error.message}`, 'error');
                console.error('❌ Error checking manager:', error);
                return;
            }
            
            // Test 2: Check Data Loading Status
            try {
                await window.universalDataManager.waitForReady();
                const status = window.universalDataManager.getStatus();
                
                updateStatus('data-status', 
                    `✅ Manager Status: Initialized: ${status.isInitialized}, Data Loaded: ${status.isDataLoaded}`, 
                    status.isInitialized && status.isDataLoaded ? 'success' : 'warning'
                );
                console.log('📊 Manager status:', status);
            } catch (error) {
                updateStatus('data-status', `❌ Error checking status: ${error.message}`, 'error');
                console.error('❌ Error checking status:', error);
            }
            
            // Test 3: Test Product Data
            try {
                const products = await window.universalDataManager.getProducts();
                if (products && products.length > 0) {
                    updateStatus('product-data', 
                        `✅ Products loaded: ${products.length} items. Sample: ${JSON.stringify(products[0], null, 2)}`, 
                        'success'
                    );
                    console.log('📦 Products loaded:', products.length);
                } else {
                    updateStatus('product-data', '⚠️ No products found', 'warning');
                    console.warn('⚠️ No products found');
                }
            } catch (error) {
                updateStatus('product-data', `❌ Error loading products: ${error.message}`, 'error');
                console.error('❌ Error loading products:', error);
            }
            
            // Test 4: Test Price Lists
            try {
                const products = await window.universalDataManager.getProducts();
                if (products && products.length > 0) {
                    const priceLists = [...new Set(products.map(p => 
                        p.PriceList || p.PriceListName || p['Price List Name']
                    ))].filter(Boolean);
                    
                    updateStatus('price-lists', 
                        `✅ Price lists found: ${priceLists.length} - ${priceLists.join(', ')}`, 
                        'success'
                    );
                    console.log('💰 Price lists:', priceLists);
                } else {
                    updateStatus('price-lists', '⚠️ No price lists found (no products)', 'warning');
                }
            } catch (error) {
                updateStatus('price-lists', `❌ Error extracting price lists: ${error.message}`, 'error');
                console.error('❌ Error extracting price lists:', error);
            }
            
            // Test 5: Test Categories
            try {
                const products = await window.universalDataManager.getProducts();
                if (products && products.length > 0) {
                    const categories = [...new Set(products.map(p => 
                        p.Category || p.category
                    ))].filter(Boolean);
                    
                    updateStatus('categories', 
                        `✅ Categories found: ${categories.length} - ${categories.join(', ')}`, 
                        'success'
                    );
                    console.log('📂 Categories:', categories);
                } else {
                    updateStatus('categories', '⚠️ No categories found (no products)', 'warning');
                }
            } catch (error) {
                updateStatus('categories', `❌ Error extracting categories: ${error.message}`, 'error');
                console.error('❌ Error extracting categories:', error);
            }
        }
        
        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 DOM loaded, initializing test...');
            
            // Initialize LocalFallbackManager first
            try {
                if (typeof LocalFallbackManager !== 'undefined') {
                    window.localFallbackManager = new LocalFallbackManager();
                    await window.localFallbackManager.initialize();
                    console.log('✅ LocalFallbackManager initialized');
                }
            } catch (error) {
                console.error('❌ LocalFallbackManager initialization failed:', error);
            }
            
            // Wait a bit for everything to initialize
            setTimeout(runTests, 2000);
        });
    </script>
</body>
</html>
