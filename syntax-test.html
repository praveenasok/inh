<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntax Test</title>
</head>
<body>
    <h1>Syntax Test</h1>
    <div id="status"></div>
    
    <script>
        function updateStatus(message) {
            document.getElementById('status').innerHTML += '<div>' + message + '</div>';
            console.log(message);
        }
        
        updateStatus('Basic JavaScript working');
    </script>
    
    <!-- Test Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script>
        updateStatus('Firebase app SDK loaded');
    </script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        updateStatus('Firebase firestore SDK loaded');
    </script>
    
    <!-- Test Firebase Configuration -->
    <script src="firebase-config.js"></script>
    <script>
        updateStatus('Firebase config loaded');
    </script>
</body>
</html>
