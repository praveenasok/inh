<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .log { margin: 5px 0; padding: 10px; border-left: 4px solid #007bff; background: #f8f9fa; }
        .error { border-left-color: #dc3545; background: #f8d7da; }
        .success { border-left-color: #28a745; background: #d4edda; }
        .warning { border-left-color: #ffc107; background: #fff3cd; }
    </style>
</head>
<body>
    <h1>Simple Debug Test</h1>
    <div id="logs"></div>

    <!-- Include required scripts -->
    <script src="js/local-fallback-manager.js"></script>
    <script src="js/universal-firebase-data-manager.js"></script>

    <script>
        function log(message, type = 'log') {
            console.log(message);
            const logsDiv = document.getElementById('logs');
            const logDiv = document.createElement('div');
            logDiv.className = `log ${type}`;
            logDiv.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            logsDiv.appendChild(logDiv);
        }

        async function runTest() {
            try {
                log('Starting simple debug test...');
                
                // Check if managers exist
                log(`Local fallback manager exists: ${!!window.localFallbackManager}`);
                log(`Universal data manager exists: ${!!window.universalDataManager}`);
                
                if (!window.universalDataManager) {
                    log('Universal data manager not found!', 'error');
                    return;
                }
                
                // Test direct API call first
                log('Testing direct API call...');
                try {
                    const response = await fetch('/api/get-data?collection=products');
                    const data = await response.json();
                    log(`Direct API call successful: ${data.length} products`, 'success');
                } catch (error) {
                    log(`Direct API call failed: ${error.message}`, 'error');
                }
                
                // Test data manager initialization
                log('Testing data manager autoInitialize...');
                await window.universalDataManager.autoInitialize();
                
                const status = window.universalDataManager.getStatus();
                log(`Data manager status: ${JSON.stringify(status)}`);
                
                if (status.isInitialized && status.isDataLoaded) {
                    log('Data manager is ready!', 'success');
                    
                    // Test getting data
                    const products = await window.universalDataManager.getProducts();
                    log(`Products retrieved: ${products ? products.length : 0}`, products && products.length > 0 ? 'success' : 'warning');
                    
                    const categories = await window.universalDataManager.getCategories();
                    log(`Categories retrieved: ${categories ? categories.length : 0}`, categories && categories.length > 0 ? 'success' : 'warning');
                    
                    const salespeople = await window.universalDataManager.getSalespeople();
                    log(`Salespeople retrieved: ${salespeople ? salespeople.length : 0}`, salespeople && salespeople.length > 0 ? 'success' : 'warning');
                    
                    const priceLists = await window.universalDataManager.getPriceLists();
                    log(`Price lists retrieved: ${priceLists ? priceLists.length : 0}`, priceLists && priceLists.length > 0 ? 'success' : 'warning');
                    
                } else {
                    log('Data manager not ready!', 'error');
                }
                
            } catch (error) {
                log(`Test failed: ${error.message}`, 'error');
                log(`Stack trace: ${error.stack}`, 'error');
            }
        }

        // Run test when page loads
        window.addEventListener('DOMContentLoaded', () => {
            log('Page loaded, starting test in 1 second...');
            setTimeout(runTest, 1000);
        });
    </script>
</body>
</html>
