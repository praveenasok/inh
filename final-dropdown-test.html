<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Dropdown Test - Verification</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .warning { background-color: #fff3cd; border-color: #ffeaa7; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; max-height: 200px; }
        .dropdown-test { margin: 10px 0; padding: 10px; background: #f8f9fa; border-left: 4px solid #007bff; }
        select { width: 200px; padding: 5px; margin: 5px; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .status { font-weight: bold; }
        .pass { color: #28a745; }
        .fail { color: #dc3545; }
    </style>
</head>
<body>
    <h1>Final Dropdown Test - Data Loading Verification</h1>
    
    <div class="test-section info">
        <h2>Test Controls</h2>
        <button onclick="runFullTest()">Run Full Test</button>
        <button onclick="testDataManager()">Test Data Manager Only</button>
        <button onclick="testDropdowns()">Test Dropdowns Only</button>
        <button onclick="clearResults()">Clear Results</button>
    </div>

    <div id="test-results"></div>

    <div class="test-section">
        <h2>Live Dropdown Tests</h2>
        <div class="dropdown-test">
            <h3>Price Lists</h3>
            <select id="test-price-list">
                <option value="">Loading...</option>
            </select>
            <span id="price-list-status" class="status">Not tested</span>
        </div>
        
        <div class="dropdown-test">
            <h3>Categories</h3>
            <select id="test-category">
                <option value="">Loading...</option>
            </select>
            <span id="category-status" class="status">Not tested</span>
        </div>
        
        <div class="dropdown-test">
            <h3>Salespeople</h3>
            <select id="test-salesperson">
                <option value="">Loading...</option>
            </select>
            <span id="salesperson-status" class="status">Not tested</span>
        </div>
        
        <div class="dropdown-test">
            <h3>Products</h3>
            <select id="test-product">
                <option value="">Loading...</option>
            </select>
            <span id="product-status" class="status">Not tested</span>
        </div>
    </div>

    <!-- Include required scripts -->
    <script src="js/local-fallback-manager.js"></script>
    <script src="js/universal-firebase-data-manager.js"></script>

    <script>
        let testResults = document.getElementById('test-results');

        function addTestResult(title, content, type = 'info') {
            const section = document.createElement('div');
            section.className = `test-section ${type}`;
            section.innerHTML = `<h3>${title}</h3>${content}`;
            testResults.appendChild(section);
        }

        function clearResults() {
            testResults.innerHTML = '';
        }

        function updateDropdownStatus(dropdownId, statusId, success, message) {
            const statusElement = document.getElementById(statusId);
            statusElement.className = `status ${success ? 'pass' : 'fail'}`;
            statusElement.textContent = message;
        }

        async function testDataManager() {
            addTestResult('Data Manager Test', 'Testing universal data manager...', 'info');
            
            try {
                // Check if data manager exists
                if (!window.universalDataManager) {
                    addTestResult('Data Manager Check', '❌ Universal data manager not found', 'error');
                    return false;
                }

                // Test autoInitialize
                await window.universalDataManager.autoInitialize();
                
                // Check status
                const status = window.universalDataManager.getStatus();
                
                if (status.isInitialized && status.isDataLoaded) {
                    addTestResult('Data Manager Status', 
                        `✅ Data manager is ready<br>
                         Initialized: ${status.isInitialized}<br>
                         Data Loaded: ${status.isDataLoaded}<br>
                         Cache Size: ${status.cacheSize}<br>
                         Last Update: ${new Date(status.lastUpdate).toLocaleString()}`, 
                        'success');
                    return true;
                } else {
                    addTestResult('Data Manager Status', 
                        `❌ Data manager not ready<br>
                         Status: <pre>${JSON.stringify(status, null, 2)}</pre>`, 
                        'error');
                    return false;
                }

            } catch (error) {
                addTestResult('Data Manager Error', `❌ Error: ${error.message}<br>Stack: <pre>${error.stack}</pre>`, 'error');
                return false;
            }
        }

        async function testDropdowns() {
            addTestResult('Dropdown Population Test', 'Testing dropdown population...', 'info');
            
            try {
                if (!window.universalDataManager) {
                    addTestResult('Dropdown Test Error', '❌ Universal data manager not available', 'error');
                    return;
                }

                // Test Price Lists
                const priceLists = await window.universalDataManager.getPriceLists();
                const priceListSelect = document.getElementById('test-price-list');
                priceListSelect.innerHTML = '<option value="">Select Price List</option>';
                
                if (priceLists && priceLists.length > 0) {
                    priceLists.forEach(priceList => {
                        const option = document.createElement('option');
                        option.value = priceList;
                        option.textContent = priceList;
                        priceListSelect.appendChild(option);
                    });
                    updateDropdownStatus('test-price-list', 'price-list-status', true, `✅ ${priceLists.length} price lists loaded`);
                } else {
                    updateDropdownStatus('test-price-list', 'price-list-status', false, '❌ No price lists found');
                }

                // Test Categories
                const categories = await window.universalDataManager.getCategories();
                const categorySelect = document.getElementById('test-category');
                categorySelect.innerHTML = '<option value="">Select Category</option>';
                
                if (categories && categories.length > 0) {
                    categories.forEach(category => {
                        const option = document.createElement('option');
                        option.value = category;
                        option.textContent = category;
                        categorySelect.appendChild(option);
                    });
                    updateDropdownStatus('test-category', 'category-status', true, `✅ ${categories.length} categories loaded`);
                } else {
                    updateDropdownStatus('test-category', 'category-status', false, '❌ No categories found');
                }

                // Test Salespeople
                const salespeople = await window.universalDataManager.getSalespeople();
                const salespersonSelect = document.getElementById('test-salesperson');
                salespersonSelect.innerHTML = '<option value="">Select Salesperson</option>';
                
                if (salespeople && salespeople.length > 0) {
                    salespeople.forEach(person => {
                        const option = document.createElement('option');
                        option.value = person.name || person.Name || person;
                        option.textContent = person.name || person.Name || person;
                        salespersonSelect.appendChild(option);
                    });
                    updateDropdownStatus('test-salesperson', 'salesperson-status', true, `✅ ${salespeople.length} salespeople loaded`);
                } else {
                    updateDropdownStatus('test-salesperson', 'salesperson-status', false, '❌ No salespeople found');
                }

                // Test Products (just count, don't populate all)
                const products = await window.universalDataManager.getProducts();
                const productSelect = document.getElementById('test-product');
                productSelect.innerHTML = '<option value="">Select Product</option>';
                
                if (products && products.length > 0) {
                    // Add just first 10 products for testing
                    products.slice(0, 10).forEach(product => {
                        const option = document.createElement('option');
                        option.value = product.id || product.ID;
                        option.textContent = `${product.Product || product.product || 'Product'} - ${product.Length || product.length || 'N/A'}"`;
                        productSelect.appendChild(option);
                    });
                    updateDropdownStatus('test-product', 'product-status', true, `✅ ${products.length} products available (showing first 10)`);
                } else {
                    updateDropdownStatus('test-product', 'product-status', false, '❌ No products found');
                }

                addTestResult('Dropdown Test Complete', '✅ All dropdown tests completed', 'success');

            } catch (error) {
                addTestResult('Dropdown Test Error', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function runFullTest() {
            clearResults();
            addTestResult('Full Test Started', 'Running comprehensive data loading and dropdown test...', 'info');
            
            const dataManagerReady = await testDataManager();
            
            if (dataManagerReady) {
                await testDropdowns();
                addTestResult('Test Summary', '🎉 All tests completed successfully! Data loading is working correctly.', 'success');
            } else {
                addTestResult('Test Summary', '❌ Data manager test failed. Cannot proceed with dropdown tests.', 'error');
            }
        }

        // Auto-run test when page loads
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                addTestResult('Page Loaded', 'Starting automatic test in 2 seconds...', 'info');
                setTimeout(runFullTest, 2000);
            }, 1000);
        });
    </script>
</body>
</html>
