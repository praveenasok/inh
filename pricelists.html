  <script>
    // FX API Configuration
    const FX_API_KEY = 'fca_live_VQSyOjJhKJhGGJhGGJhGGJhGGJhGGJhG';
    const FX_API_URL = 'https://api.freecurrencyapi.com/v1/latest';
    
    // Supported currencies with their symbols
    const SUPPORTED_CURRENCIES = {
      'INR': { symbol: '₹', name: 'Indian Rupee' },
      'USD': { symbol: '$', name: 'US Dollar' },
      'EUR': { symbol: '€', name: 'Euro' },
      'GBP': { symbol: '£', name: 'British Pound' },
      'AUD': { symbol: 'A$', name: 'Australian Dollar' },
      'SAR': { symbol: 'SAR ', name: 'Saudi Riyal' },
      'NGN': { symbol: '₦', name: 'Nigerian Naira' },
      'AED': { symbol: 'د.إ ', name: 'UAE Dirham' },
      'JPY': { symbol: '¥', name: 'Japanese Yen' }
    };
    
    // Default exchange rates (fallback)
    const DEFAULT_RATES = {
      'INR': 1,
      'USD': 0.012,
      'EUR': 0.011,
      'GBP': 0.0095,
      'AUD': 0.018,
      'SAR': 0.045,
      'NGN': 19.2,
      'AED': 0.044,
      'JPY': 1.8
    };
    
    // Product data will be loaded here
    let productData = [];
    
    // LocalStorageDropdownManager removed - using Firebase-only data
    
    // Product data and salesmen data will be loaded from Firebase
    
    // Application state
    let state = {
      segments: [],
      currency: 'INR',
      factor: 1,
      kg: false,
      salesman: '',
      exchangeRates: DEFAULT_RATES
    };
    
    // Wait for Firebase to be ready
    async function waitForFirebase() {
      let attempts = 0;
      const maxAttempts = 20; // 10 seconds max wait
      
      while ((!window.firebase || !window.firebaseConfig) && attempts < maxAttempts) {
        await new Promise(resolve => setTimeout(resolve, 500));
        attempts++;
      }
      
      if (!window.firebase || !window.firebaseConfig) {
        throw new Error('Firebase not available after waiting');
      }
    }

    // Initialize Firebase
    async function initializeFirebase() {
      try {
        
        // Wait for universal data manager to be available
        let attempts = 0;
        const maxAttempts = 20; // 10 seconds max wait
        
        while (!window.UniversalFirebaseDataManager && attempts < maxAttempts) {
          await new Promise(resolve => setTimeout(resolve, 500));
          attempts++;
        }
        
        if (!window.UniversalFirebaseDataManager) {
          throw new Error('UniversalFirebaseDataManager not available after waiting');
        }
        
        // Initialize the data manager
        window.dataManager = new UniversalFirebaseDataManager();
        
        console.log('Firebase initialized successfully');
        return true;
        
      } catch (error) {
        console.error('Error initializing Firebase:', error);
        throw error;
      }
    }

    // Load data from Firebase
    async function loadData() {
      try {
        console.log('Loading data from Firebase...');
        
        // Load all required data
        const [products, salespeople, categories, priceLists] = await Promise.all([
          dataManager.loadCollection('products'),
          dataManager.loadCollection('salespeople'),
          dataManager.loadCollection('categories'),
          dataManager.loadCollection('price-lists')
        ]);
        
        console.log('Data loaded:', { products, salespeople, categories, priceLists });
        
        // Store data globally
        window.productData = products || [];
        window.salespeople = salespeople || [];
        window.categories = categories || [];
        window.priceLists = priceLists || [];
        
        // Populate dropdowns
        populateDropdowns();
        
        console.log('Data loading completed');
        
      } catch (error) {
        console.error('Error loading data:', error);
        // Show user-friendly error message
        showNotification('Error loading data. Please refresh the page.', 'error');
      }
    }

    // Populate all dropdowns
    function populateDropdowns() {
      try {
        // Populate price lists
        populatePriceLists();
        
        // Populate salespeople
        populateSalespeople();
        
        // Populate categories
        populateCategories();
        
        // Populate products
        populateProducts();
        
        console.log('All dropdowns populated');
        
      } catch (error) {
        console.error('Error populating dropdowns:', error);
      }
    }

    // Populate price lists dropdown
    function populatePriceLists() {
      const priceListSelect = document.getElementById('price-list');
      if (!priceListSelect) return;
      
      // Clear existing options except the first one
      priceListSelect.innerHTML = '<option value="">Select Price List</option>';
      
      if (window.priceLists && window.priceLists.length > 0) {
        window.priceLists.forEach(priceList => {
          const option = document.createElement('option');
          option.value = priceList.id || priceList.name;
          option.textContent = priceList.name || priceList.id;
          priceListSelect.appendChild(option);
        });
      }
    }

    // Populate salespeople dropdown
    function populateSalespeople() {
      const salesmanSelect = document.getElementById('salesman');
      if (!salesmanSelect) return;
      
      // Clear existing options except the first one
      salesmanSelect.innerHTML = '<option value="">Select Sales Representative</option>';
      
      if (window.salespeople && window.salespeople.length > 0) {
        window.salespeople.forEach(salesperson => {
          const option = document.createElement('option');
          option.value = salesperson.id || salesperson.name;
          option.textContent = salesperson.name || salesperson.id;
          salesmanSelect.appendChild(option);
        });
      }
    }

    // Populate categories dropdown
    function populateCategories() {
      const categorySelect = document.getElementById('category');
      if (!categorySelect) return;
      
      // Clear existing options except the first one
      categorySelect.innerHTML = '<option value="">All Categories</option>';
      
      if (window.categories && window.categories.length > 0) {
        window.categories.forEach(category => {
          const option = document.createElement('option');
          option.value = category.id || category.name;
          option.textContent = category.name || category.id;
          categorySelect.appendChild(option);
        });
      }
    }

    // Populate products dropdown
    function populateProducts() {
      const productSelect = document.getElementById('product');
      if (!productSelect) return;
      
      // Clear existing options except the first one
      productSelect.innerHTML = '<option value="">All Products</option>';
      
      if (window.productData && window.productData.length > 0) {
        // Get unique products
        const uniqueProducts = [...new Set(window.productData.map(p => p.product))].filter(Boolean);
        
        uniqueProducts.forEach(product => {
          const option = document.createElement('option');
          option.value = product;
          option.textContent = product;
          productSelect.appendChild(option);
        });
      }
    }

    // Update density dropdown based on selected product
    function updateDensityDropdown() {
      const productSelect = document.getElementById('product');
      const densitySelect = document.getElementById('density');
      
      if (!productSelect || !densitySelect) return;
      
      const selectedProduct = productSelect.value;
      
      // Clear density options
      densitySelect.innerHTML = '<option value="">All Densities</option>';
      
      if (selectedProduct && window.productData) {
        // Get densities for selected product
        const densities = [...new Set(
          window.productData
            .filter(p => p.product === selectedProduct)
            .map(p => p.density)
            .filter(Boolean)
        )];
        
        densities.forEach(density => {
          const option = document.createElement('option');
          option.value = density;
          option.textContent = density;
          densitySelect.appendChild(option);
        });
      }
    }

    // Update color dropdown based on selected product and density
    function updateColorDropdown() {
      const productSelect = document.getElementById('product');
      const densitySelect = document.getElementById('density');
      const colorSelect = document.getElementById('color');
      
      if (!productSelect || !densitySelect || !colorSelect) return;
      
      const selectedProduct = productSelect.value;
      const selectedDensity = densitySelect.value;
      
      // Clear color options
      colorSelect.innerHTML = '<option value="">All Shades</option>';
      
      if (window.productData) {
        let filteredData = window.productData;
        
        if (selectedProduct) {
          filteredData = filteredData.filter(p => p.product === selectedProduct);
        }
        
        if (selectedDensity) {
          filteredData = filteredData.filter(p => p.density === selectedDensity);
        }
        
        // Get unique colors
        const colors = [...new Set(filteredData.map(p => p.color).filter(Boolean))];
        
        colors.forEach(color => {
          const option = document.createElement('option');
          option.value = color;
          option.textContent = color;
          colorSelect.appendChild(option);
        });
      }
    }

    // Event listeners for dropdown changes
    document.addEventListener('DOMContentLoaded', function() {
      const productSelect = document.getElementById('product');
      const densitySelect = document.getElementById('density');
      
      if (productSelect) {
        productSelect.addEventListener('change', function() {
          updateDensityDropdown();
          updateColorDropdown();
        });
      }
      
      if (densitySelect) {
        densitySelect.addEventListener('change', updateColorDropdown);
      }
    });

    // Fetch exchange rates
    async function fetchExchangeRates() {
      try {
        const response = await fetch(`${FX_API_URL}?apikey=${FX_API_KEY}&base_currency=INR`);
        const data = await response.json();
        
        if (data && data.data) {
          state.exchangeRates = { ...DEFAULT_RATES, ...data.data };
          console.log('Exchange rates updated:', state.exchangeRates);
        }
      } catch (error) {
        console.error('Error fetching exchange rates:', error);
        // Use default rates
        state.exchangeRates = DEFAULT_RATES;
      }
    }

    // Format currency
    function formatCurrency(amount, currency = 'INR') {
      const currencyInfo = SUPPORTED_CURRENCIES[currency] || SUPPORTED_CURRENCIES['INR'];
      const convertedAmount = amount * (state.exchangeRates[currency] || 1);
      
      return `${currencyInfo.symbol}${convertedAmount.toFixed(2)}`;
    }

    // Clear all filters
    function clearAll() {
      document.getElementById('price-list').value = '';
      document.getElementById('currency').value = 'INR';
      document.getElementById('factor').value = '1';
      document.getElementById('salesman').value = '';
      document.getElementById('category').value = '';
      document.getElementById('product').value = '';
      document.getElementById('density').value = '';
      document.getElementById('color').value = '';
      document.getElementById('kg-toggle').checked = false;
      
      // Update state
      state.currency = 'INR';
      state.factor = 1;
      state.kg = false;
      state.salesman = '';
      
      // Hide preview
      document.getElementById('preview-section').style.display = 'none';
      
      // Update dropdowns
      updateDensityDropdown();
      updateColorDropdown();
    }

    // Generate preview
    function generatePreview() {
      const priceList = document.getElementById('price-list').value;
      const currency = document.getElementById('currency').value;
      const factor = parseFloat(document.getElementById('factor').value) || 1;
      const salesman = document.getElementById('salesman').value;
      const category = document.getElementById('category').value;
      const product = document.getElementById('product').value;
      const density = document.getElementById('density').value;
      const color = document.getElementById('color').value;
      const isKg = document.getElementById('kg-toggle').checked;
      
      if (!priceList) {
        showNotification('Please select a price list', 'error');
        return;
      }
      
      // Update state
      state.currency = currency;
      state.factor = factor;
      state.kg = isKg;
      state.salesman = salesman;
      
      // Filter data
      let filteredData = window.productData || [];
      
      if (category) {
        filteredData = filteredData.filter(item => item.category === category);
      }
      
      if (product) {
        filteredData = filteredData.filter(item => item.product === product);
      }
      
      if (density) {
        filteredData = filteredData.filter(item => item.density === density);
      }
      
      if (color) {
        filteredData = filteredData.filter(item => item.color === color);
      }
      
      // Generate HTML preview
      generateHTMLPreview(filteredData, priceList, salesman);
      
      // Show preview section
      document.getElementById('preview-section').style.display = 'block';
      
      // Scroll to preview
      document.getElementById('preview-section').scrollIntoView({ behavior: 'smooth' });
    }

    // Generate HTML preview
    function generateHTMLPreview(data, priceListName, salesmanName) {
      const currencyInfo = SUPPORTED_CURRENCIES[state.currency] || SUPPORTED_CURRENCIES['INR'];
      const salesmanInfo = window.salespeople?.find(s => (s.id || s.name) === salesmanName);
      
      let html = `
        <div class="price-list-preview">
          <div class="header text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Price List</h1>
            <div class="text-lg text-gray-600">${priceListName}</div>
            ${salesmanInfo ? `<div class="text-sm text-gray-500 mt-1">Sales Representative: ${salesmanInfo.name}</div>` : ''}
            <div class="text-sm text-gray-500 mt-1">Currency: ${currencyInfo.name} (${currencyInfo.symbol})</div>
            ${state.factor !== 1 ? `<div class="text-sm text-gray-500">Factor: ${state.factor}</div>` : ''}
            ${state.kg ? `<div class="text-sm text-gray-500">Prices shown per KG</div>` : ''}
          </div>
          
          <div class="overflow-x-auto">
            <table class="w-full border-collapse border border-gray-300">
              <thead>
                <tr class="bg-gray-100">
                  <th class="border border-gray-300 px-4 py-2 text-left">Product</th>
                  <th class="border border-gray-300 px-4 py-2 text-left">Category</th>
                  <th class="border border-gray-300 px-4 py-2 text-left">Density</th>
                  <th class="border border-gray-300 px-4 py-2 text-left">Color</th>
                  <th class="border border-gray-300 px-4 py-2 text-right">Price</th>
                </tr>
              </thead>
              <tbody>
      `;
      
      if (data.length === 0) {
        html += `
          <tr>
            <td colspan="5" class="border border-gray-300 px-4 py-8 text-center text-gray-500">
              No products found matching the selected criteria.
            </td>
          </tr>
        `;
      } else {
        data.forEach(item => {
          let price = parseFloat(item.price) || 0;
          
          // Apply factor
          price *= state.factor;
          
          // Convert to KG if needed
          if (state.kg && item.weight) {
            const weight = parseFloat(item.weight) || 1;
            price = price / weight;
          }
          
          const formattedPrice = formatCurrency(price, state.currency);
          
          html += `
            <tr>
              <td class="border border-gray-300 px-4 py-2">${item.product || '-'}</td>
              <td class="border border-gray-300 px-4 py-2">${item.category || '-'}</td>
              <td class="border border-gray-300 px-4 py-2">${item.density || '-'}</td>
              <td class="border border-gray-300 px-4 py-2">${item.color || '-'}</td>
              <td class="border border-gray-300 px-4 py-2 text-right font-mono">${formattedPrice}</td>
            </tr>
          `;
        });
      }
      
      html += `
              </tbody>
            </table>
          </div>
          
          <div class="footer mt-6 text-center text-sm text-gray-500">
            <p>Generated on ${new Date().toLocaleDateString()}</p>
            <p>© 2024 Indian Natural Hair Pvt Ltd. All rights reserved.</p>
          </div>
        </div>
      `;
      
      document.getElementById('htmlPreview').innerHTML = html;
    }

    // Toggle share menu
    function toggleShareMenu() {
      const dropdown = document.getElementById('shareDropdown');
      dropdown.classList.toggle('hidden');
    }

    // Download PDF from menu
    async function downloadPDFFromMenu() {
      // Hide the dropdown first
      document.getElementById('shareDropdown').classList.add('hidden');
      
      try {
        const element = document.getElementById('htmlPreview');
        
        if (!element || !element.innerHTML.trim()) {
          showNotification('Please generate a preview first', 'error');
          return;
        }
        
        // Show loading
        showNotification('Generating PDF...', 'info');
        
        // Generate PDF using html2canvas and jsPDF
        const canvas = await html2canvas(element, {
          scale: 2,
          useCORS: true,
          allowTaint: true
        });
        
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jsPDF('p', 'mm', 'a4');
        
        const imgWidth = 210;
        const pageHeight = 295;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        let heightLeft = imgHeight;
        
        let position = 0;
        
        pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
        heightLeft -= pageHeight;
        
        while (heightLeft >= 0) {
          position = heightLeft - imgHeight;
          pdf.addPage();
          pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
          heightLeft -= pageHeight;
        }
        
        // Save the PDF
        const priceList = document.getElementById('price-list').value || 'PriceList';
        const fileName = `${priceList}_${new Date().toISOString().split('T')[0]}.pdf`;
        pdf.save(fileName);
        
        showNotification('PDF downloaded successfully!', 'success');
        
      } catch (error) {
        console.error('Error generating PDF:', error);
        showNotification('Error generating PDF. Please try again.', 'error');
      }
    }

    // Show notification
    function showNotification(message, type = 'info') {
      // Create notification element
      const notification = document.createElement('div');
      notification.className = `fixed top-4 right-4 z-50 px-4 py-2 rounded-lg text-white font-medium ${
        type === 'error' ? 'bg-red-500' : 
        type === 'success' ? 'bg-green-500' : 
        'bg-blue-500'
      }`;
      notification.textContent = message;
      
      // Add to page
      document.body.appendChild(notification);
      
      // Remove after 3 seconds
      setTimeout(() => {
        if (notification.parentNode) {
          notification.parentNode.removeChild(notification);
        }
      }, 3000);
    }

    // Mobile menu toggle
    function toggleMobileMenu() {
      const mobileMenu = document.getElementById('mobileMenu');
      const hamburger = document.querySelector('.hamburger-menu');
      
      mobileMenu.classList.toggle('show');
      hamburger.classList.toggle('active');
    }

    // Close dropdowns when clicking outside
    document.addEventListener('click', function(event) {
      const shareDropdown = document.getElementById('shareDropdown');
      const shareBtn = document.getElementById('shareMenuBtn');
      
      if (!shareBtn.contains(event.target)) {
        shareDropdown.classList.add('hidden');
      }
      
      // Close mobile menu when clicking outside
      const mobileMenu = document.getElementById('mobileMenu');
      const hamburger = document.querySelector('.hamburger-menu');
      
      if (!hamburger.contains(event.target) && !mobileMenu.contains(event.target)) {
        mobileMenu.classList.remove('show');
        hamburger.classList.remove('active');
      }
    });

    // Initialize the application
    async function initializeApp() {
      try {
        console.log('Initializing application...');
        
        // Wait for Firebase to be ready
        await waitForFirebase();
        
        // Initialize Firebase
        await initializeFirebase();
        
        // Load data
        await loadData();
        
        // Fetch exchange rates
        await fetchExchangeRates();
        
        console.log('Application initialized successfully');
        
      } catch (error) {
        console.error('Error initializing application:', error);
        showNotification('Error initializing application. Please refresh the page.', 'error');
      }
    }

    // Start the application when DOM is loaded
    document.addEventListener('DOMContentLoaded', initializeApp);
  </script>
