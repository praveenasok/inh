<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Hair Manufacturing Order - InstaQuote Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        /* Hide number input spinners */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
            appearance: none;
        }
        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
    </style>
</head>

<body class="bg-[#f8fafc] min-h-screen text-slate-900">
    <script>window.navConfig = { siteTitle: 'InstaQuote Suite' };</script>
    <script src="js/navigation-loader.js"></script>

    <div class="container mx-auto w-full max-w-[1600px] px-4 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-black text-slate-900 tracking-tight flex items-center">
                <i class="fa-solid fa-industry text-indigo-600 mr-3"></i> Raw Hair Manufacturing Tracker
            </h1>
            <p class="text-slate-500 mt-2 font-medium">Calculate expected raw length output based on specific ratio templates.</p>
        </div>

        <!-- Main Content (Top-Down Layout for Maximum Table Width) -->
        <div class="space-y-6 bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            
            <!-- Controls (Full Width wrapped like Ratio Mixer) -->
            <div>
                <div class="flex justify-between items-center mb-4 border-b border-slate-200 pb-2">
                    <h2 class="text-sm font-black text-[#081249] uppercase tracking-widest text-left">Configuration Setup</h2>
                    <select id="loadSavedMoSelect" class="bg-[#f8fafc] border border-slate-300 text-[#081249] text-xs font-bold rounded focus:ring-[#081249] focus:border-[#081249] p-1.5 outline-none w-64 truncate cursor-pointer transition-colors hover:bg-slate-100 hidden">
                        <option value="">Load Past MO...</option>
                    </select>
                </div>
                
                <!-- Group 1: Order Details -->
                <div class="flex flex-wrap gap-4 items-end bg-slate-100 p-4 rounded-lg border border-slate-200 mb-4">
                    <div class="flex-1 min-w-[140px]">
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider">Order Number</label>
                        <input type="text" id="orderNumber" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded focus:ring-[#081249] focus:border-[#081249] block p-1.5 outline-none transition-all" placeholder="e.g. ORD-1024">
                    </div>
                    <div class="flex-1 min-w-[140px]">
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider">Date</label>
                        <input type="date" id="orderDate" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded focus:ring-[#081249] focus:border-[#081249] block p-1.5 outline-none transition-all">
                    </div>
                    <div class="flex-1 min-w-[140px]">
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider">Supplier</label>
                        <input type="text" id="orderSupplier" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded focus:ring-[#081249] focus:border-[#081249] block p-1.5 outline-none transition-all" placeholder="Supplier Name">
                    </div>
                    <div class="flex-1 min-w-[140px]">
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider">Reference</label>
                        <input type="text" id="orderRef" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded focus:ring-[#081249] focus:border-[#081249] block p-1.5 outline-none transition-all" placeholder="Client / PO #">
                    </div>
                    <div class="flex-1 min-w-[140px]">
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider">Hair Type</label>
                        <select id="orderHairType" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded focus:ring-[#081249] focus:border-[#081249] block p-1.5 outline-none transition-all">
                            <option value="Normal">Normal</option>
                            <option value="Bleachable">Bleachable</option>
                        </select>
                    </div>
                </div>

                <!-- Group 2: Ratio & Target Lengths -->
                <div class="bg-slate-100 p-4 rounded-lg border border-slate-200">
                    <div class="flex flex-wrap items-end gap-4">
                        <div class="min-w-[200px]">
                            <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider">Select Ratio Template</label>
                            <select id="ratioSelect" class="w-full bg-white border border-slate-300 text-slate-900 text-sm font-semibold rounded focus:ring-[#081249] focus:border-[#081249] block p-1.5 outline-none transition-all">
                                <option value="">Loading ratios...</option>
                            </select>
                        </div>
                        <div class="hidden ml-auto flex items-center gap-3 bg-white px-3 py-1.5 rounded border border-slate-200" id="totalInputSection">
                            <span class="text-xs font-bold text-slate-500 uppercase">Total Target Input</span>
                            <span id="totalInputKg" class="text-sm font-black text-[#081249]">0.00 kg</span>
                        </div>
                    </div>
                    
                    <div id="dynamicInputsContainer" class="mt-4">
                        <!-- Dynamic inputs loaded by JS -->
                    </div>
                    
                    <div class="mt-5 border-t border-slate-200 pt-4 flex justify-end">
                        <button id="calculateBtn" class="bg-[#081249] hover:bg-[#0a1555] text-white font-bold py-2 px-6 rounded shadow transition-colors flex items-center justify-center gap-2 text-sm">
                            <i class="fa-solid fa-calculator"></i> Generate Manufacturing Order
                        </button>
                    </div>
                </div>

            </div>

            <!-- Results Area -->
            <div class="pt-6 border-t border-slate-200 mt-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-black text-[#081249]">Manufacturing Output Results</h2>
                    <span id="outputSummary" class="text-xs font-bold text-[#081249] bg-slate-100 px-3 py-1 rounded hidden border border-slate-200"></span>
                </div>

                <div id="resultsContainer" class="min-h-[200px]">
                    <!-- Default empty state -->
                    <div class="flex flex-col items-center justify-center h-48 text-slate-400 bg-slate-50 rounded-lg border border-dashed border-slate-300">
                        <i class="fa-solid fa-table text-3xl mb-3 opacity-20"></i>
                        <p class="font-medium text-slate-500 text-sm">Select a ratio and enter kilos to view the order breakdown here.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Core Script -->
    <script src="js/raw-manufacturing-order.js"></script>
</body>
</html>
