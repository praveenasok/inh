<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Count INDIA25 Categories (products)</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 20px; }
    .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); max-width: 800px; }
    .status { padding: 10px; border-radius: 4px; margin-bottom: 15px; }
    .loading { background: #fff3cd; border: 1px solid #ffeaa7; }
    .success { background: #d4edda; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; border: 1px solid #f5c6cb; }
    .count { font-size: 28px; font-weight: bold; color: #1976d2; }
    .list { background: #f8f9fa; padding: 10px; border-left: 4px solid #007bff; border-radius: 4px; white-space: pre-wrap; }
  </style>
  <script src="firebase-config.js"></script>
  <script src="js/fallback-detector.js"></script>
  <script src="js/local-fallback-manager.js"></script>
  <script src="js/universal-firebase-data-manager.js"></script>
  <script src="js/unified-data-access.js"></script>
</head>
<body>
  <div class="card">
    <h1>Distinct Categories in products where Price List Name = "INDIA25"</h1>
    <div id="status" class="status loading">Initializing...</div>
    <p>Final distinct count:</p>
    <div id="result" class="count">-</div>
    <p>Source: <span id="source">-</span></p>
    <h3>Categories</h3>
    <div id="list" class="list">Loading...</div>
  </div>

  <script>
    (async function() {
      const statusEl = document.getElementById('status');
      const resultEl = document.getElementById('result');
      const listEl = document.getElementById('list');

      function setStatus(text, type) {
        statusEl.textContent = text;
        statusEl.className = `status ${type}`;
      }

      try {
        setStatus('Setting up data access...', 'loading');
        const sourceEl = document.getElementById('source');

        // Use canonical categories from pricelists via UnifiedDataAccess
        const dataAccess = new UnifiedDataAccess();
        await dataAccess.ensureInitialized();
        setStatus('Fetching categories...', 'loading');

        let categories = await dataAccess.getCategories('INDIA25');
        let source = 'pricelists';

        // Fallback: derive from products if canonical categories unavailable
        if (!Array.isArray(categories) || categories.length === 0) {
          const udm = window.universalDataManager;
          if (!udm) throw new Error('UniversalDataManager not available for fallback');
          await udm.initialize();
          await udm.loadAllData();
          await udm.waitForReady();
          setStatus('Fetching products for fallback...', 'loading');

          const products = await udm.getData('products');
          const filtered = (products || []).filter(p => {
            const pl = p['Price List Name'] || p.PriceListName || p.PriceList || p.priceList;
            return String(pl || '').trim() === 'INDIA25';
          });
          categories = [...new Set(
            filtered
              .map(p => p.Category || p.category || p.ProductCategory)
              .filter(Boolean)
              .map(c => String(c).trim())
          )].sort();
          source = 'products-derived';
        }

        resultEl.textContent = String(categories.length || 0);
        listEl.textContent = (Array.isArray(categories) ? categories : []).sort().join(', ');
        sourceEl.textContent = source;
        setStatus('✅ Categories loaded.', 'success');
        console.log('INDIA25 categories source:', source, 'Categories:', categories);
      } catch (e) {
        console.error('Error counting categories:', e);
        setStatus(`❌ Error: ${e.message}`, 'error');
        resultEl.textContent = 'Error';
        listEl.textContent = '—';
      }
    })();
  </script>
</body>
</html>
