<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Shades from Database</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .controls {
            text-align: center;
            margin-bottom: 30px;
        }
        button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 0 10px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .loading {
            text-align: center;
            color: #666;
            font-size: 18px;
            margin: 20px 0;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .success {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .shade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .shade-item {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            font-weight: 500;
        }
        .stats {
            background: #f0f4f8;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .stats h3 {
            margin-top: 0;
            color: #333;
        }
        .category-section {
            margin: 30px 0;
            padding: 20px;
            background: #fafafa;
            border-radius: 10px;
        }
        .category-title {
            color: #667eea;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Complete Shades Database</h1>
        
        <div class="controls">
            <button onclick="loadAllShades()">📋 Load All Shades</button>
            <button onclick="loadShadesByCategory()">📊 Group by Category</button>
            <button onclick="exportShades()">💾 Export List</button>
        </div>
        
        <div id="results"></div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        let db;
        let allShadesData = [];
        
        // Initialize Firebase
        async function initFirebase() {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                db = firebase.firestore();
                console.log('Firebase initialized successfully');
                return true;
            } catch (error) {
                console.error('Firebase initialization error:', error);
                showMessage('Failed to initialize Firebase: ' + error.message, 'error');
                return false;
            }
        }

        function showMessage(message, type = 'success') {
            const results = document.getElementById('results');
            const messageDiv = document.createElement('div');
            messageDiv.className = type;
            messageDiv.innerHTML = message;
            results.appendChild(messageDiv);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        async function loadAllShades() {
            clearResults();
            showMessage('🔄 Loading all shades from Firebase database...', 'loading');
            
            try {
                const initialized = await initFirebase();
                if (!initialized) return;

                // Query the priceLists collection
                const snapshot = await db.collection('priceLists').get();
                console.log(`Found ${snapshot.size} documents in priceLists collection`);
                
                const shadesSet = new Set();
                const allData = [];
                let totalProducts = 0;
                let productsWithShades = 0;
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    totalProducts++;
                    allData.push(data);
                    
                    // Check for shade field (multiple possible field names)
                    const shade = data.Shade || data.shade || data.SHADE || data.Colors || data.Color || data.color;
                    
                    if (shade && shade.trim()) {
                        // Handle comma-separated shades
                        const shadeValues = shade.toString().split(',').map(s => s.trim()).filter(s => s);
                        shadeValues.forEach(shadeValue => {
                            if (shadeValue) {
                                shadesSet.add(shadeValue);
                                productsWithShades++;
                            }
                        });
                    }
                });
                
                allShadesData = allData;
                const sortedShades = Array.from(shadesSet).sort();
                
                clearResults();
                
                // Show statistics
                showMessage(`
                    <div class="stats">
                        <h3>📊 Database Statistics</h3>
                        <p><strong>Total Products:</strong> ${totalProducts}</p>
                        <p><strong>Products with Shades:</strong> ${productsWithShades}</p>
                        <p><strong>Unique Shades Found:</strong> ${sortedShades.length}</p>
                        <p><strong>Coverage:</strong> ${((productsWithShades / totalProducts) * 100).toFixed(1)}%</p>
                    </div>
                `, 'success');
                
                // Display all shades
                let shadesHTML = '<h3>🎨 Complete List of Shades (' + sortedShades.length + ' total)</h3>';
                shadesHTML += '<div class="shade-grid">';
                
                sortedShades.forEach((shade, index) => {
                    shadesHTML += `<div class="shade-item">${index + 1}. ${shade}</div>`;
                });
                
                shadesHTML += '</div>';
                
                showMessage(shadesHTML, 'success');
                
            } catch (error) {
                console.error('Error loading shades:', error);
                showMessage('Error loading shades: ' + error.message, 'error');
            }
        }

        async function loadShadesByCategory() {
            clearResults();
            showMessage('🔄 Loading shades grouped by category...', 'loading');
            
            try {
                const initialized = await initFirebase();
                if (!initialized) return;

                const snapshot = await db.collection('priceLists').get();
                
                const categoryShades = {};
                let totalUniqueShades = new Set();
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const category = data.Category || data.category || 'Unknown Category';
                    const shade = data.Shade || data.shade || data.SHADE || data.Colors || data.Color || data.color;
                    
                    if (shade && shade.trim()) {
                        if (!categoryShades[category]) {
                            categoryShades[category] = new Set();
                        }
                        
                        // Handle comma-separated shades
                        const shadeValues = shade.toString().split(',').map(s => s.trim()).filter(s => s);
                        shadeValues.forEach(shadeValue => {
                            if (shadeValue) {
                                categoryShades[category].add(shadeValue);
                                totalUniqueShades.add(shadeValue);
                            }
                        });
                    }
                });
                
                clearResults();
                
                // Show overall statistics
                showMessage(`
                    <div class="stats">
                        <h3>📊 Shades by Category</h3>
                        <p><strong>Total Categories:</strong> ${Object.keys(categoryShades).length}</p>
                        <p><strong>Total Unique Shades:</strong> ${totalUniqueShades.size}</p>
                    </div>
                `, 'success');
                
                // Display shades by category
                Object.keys(categoryShades).sort().forEach(category => {
                    const shadesInCategory = Array.from(categoryShades[category]).sort();
                    
                    let categoryHTML = `
                        <div class="category-section">
                            <div class="category-title">${category} (${shadesInCategory.length} shades)</div>
                            <div class="shade-grid">
                    `;
                    
                    shadesInCategory.forEach((shade, index) => {
                        categoryHTML += `<div class="shade-item">${index + 1}. ${shade}</div>`;
                    });
                    
                    categoryHTML += '</div></div>';
                    
                    showMessage(categoryHTML, 'success');
                });
                
            } catch (error) {
                console.error('Error loading shades by category:', error);
                showMessage('Error loading shades by category: ' + error.message, 'error');
            }
        }

        function exportShades() {
            if (allShadesData.length === 0) {
                showMessage('Please load shades data first before exporting.', 'error');
                return;
            }
            
            const shadesSet = new Set();
            allShadesData.forEach(data => {
                const shade = data.Shade || data.shade || data.SHADE || data.Colors || data.Color || data.color;
                if (shade && shade.trim()) {
                    const shadeValues = shade.toString().split(',').map(s => s.trim()).filter(s => s);
                    shadeValues.forEach(shadeValue => {
                        if (shadeValue) shadesSet.add(shadeValue);
                    });
                }
            });
            
            const sortedShades = Array.from(shadesSet).sort();
            const exportText = sortedShades.join('\n');
            
            // Create download
            const blob = new Blob([exportText], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'all_shades_list.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            
            showMessage(`✅ Exported ${sortedShades.length} shades to file: all_shades_list.txt`, 'success');
        }

        // Auto-load on page load
        window.addEventListener('load', () => {
            setTimeout(() => {
                loadAllShades();
            }, 1000);
        });
    </script>
</body>
</html>
