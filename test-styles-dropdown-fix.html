<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Styles Dropdown Fix</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; color: #155724; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #results { margin-top: 20px; }
        .result-item { margin: 5px 0; padding: 10px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🔧 Styles Dropdown Diagnostic Tool</h1>
    
    <div class="test-section info">
        <h3>📋 Test Steps</h3>
        <p>This tool will help diagnose and fix the "Error loading styles" issue in the styles dropdown.</p>
        <ol>
            <li>Test Firebase connection</li>
            <li>Test Firebase authentication</li>
            <li>Test styles collection access</li>
            <li>Test styles dropdown population</li>
        </ol>
    </div>

    <div class="test-section">
        <h3>🧪 Run Tests</h3>
        <button onclick="runAllTests()">Run All Tests</button>
        <button onclick="testFirebaseConnection()">Test Firebase Connection</button>
        <button onclick="testAuthentication()">Test Authentication</button>
        <button onclick="testStylesCollection()">Test Styles Collection</button>
        <button onclick="testStylesDropdown()">Test Styles Dropdown</button>
        <button onclick="fixAuthenticationIssue()">🔧 Fix Authentication Issue</button>
    </div>

    <div id="results"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <script>
        let db, auth;

        // Initialize Firebase
        function initializeFirebase() {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                db = firebase.firestore();
                auth = firebase.auth();
                addResult('✅ Firebase initialized successfully', 'success');
                return true;
            } catch (error) {
                addResult(`❌ Firebase initialization failed: ${error.message}`, 'error');
                return false;
            }
        }

        function addResult(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result-item ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong> - ${message}`;
            results.appendChild(div);
            console.log(message);
        }

        async function testFirebaseConnection() {
            addResult('🔍 Testing Firebase connection...', 'info');
            
            if (!initializeFirebase()) {
                return false;
            }

            try {
                // Test basic Firestore connection
                await db.collection('test').limit(1).get();
                addResult('✅ Firebase Firestore connection successful', 'success');
                return true;
            } catch (error) {
                addResult(`❌ Firebase connection failed: ${error.message}`, 'error');
                return false;
            }
        }

        async function testAuthentication() {
            addResult('🔐 Testing Firebase authentication...', 'info');
            
            if (!auth) {
                addResult('❌ Firebase Auth not available', 'error');
                return false;
            }

            try {
                // Check current user
                const currentUser = auth.currentUser;
                if (currentUser) {
                    addResult(`✅ Already authenticated: ${currentUser.uid} (${currentUser.isAnonymous ? 'anonymous' : 'authenticated'})`, 'success');
                    return true;
                }

                // Try anonymous authentication
                addResult('🔄 Attempting anonymous authentication...', 'info');
                const userCredential = await auth.signInAnonymously();
                addResult(`✅ Anonymous authentication successful: ${userCredential.user.uid}`, 'success');
                return true;
            } catch (error) {
                addResult(`❌ Authentication failed: ${error.message}`, 'error');
                if (error.code === 'auth/operation-not-allowed') {
                    addResult('💡 Solution: Anonymous authentication is disabled in Firebase Console', 'error');
                    addResult('📝 Go to Firebase Console > Authentication > Sign-in method > Enable Anonymous', 'info');
                }
                return false;
            }
        }

        async function testStylesCollection() {
            addResult('📊 Testing styles collection access...', 'info');
            
            try {
                const stylesSnapshot = await db.collection('styles').limit(5).get();
                
                if (stylesSnapshot.empty) {
                    addResult('⚠️ Styles collection is empty', 'error');
                    return false;
                }

                const stylesCount = stylesSnapshot.size;
                const firstStyle = stylesSnapshot.docs[0].data();
                
                addResult(`✅ Found ${stylesCount} styles in collection`, 'success');
                addResult(`📝 First style: ${JSON.stringify(firstStyle, null, 2)}`, 'info');
                
                // Check for stylename field
                if (firstStyle.stylename) {
                    addResult(`✅ 'stylename' field found: ${firstStyle.stylename}`, 'success');
                } else if (firstStyle.name) {
                    addResult(`⚠️ Using 'name' field instead of 'stylename': ${firstStyle.name}`, 'error');
                } else {
                    addResult('❌ No name or stylename field found', 'error');
                }
                
                return true;
            } catch (error) {
                addResult(`❌ Styles collection access failed: ${error.message}`, 'error');
                return false;
            }
        }

        async function testStylesDropdown() {
            addResult('🎛️ Testing styles dropdown population...', 'info');
            
            // Create a test dropdown
            const testDropdown = document.createElement('select');
            testDropdown.id = 'test-style-selector';
            testDropdown.innerHTML = '<option value="">Loading styles...</option>';
            
            const testContainer = document.createElement('div');
            testContainer.innerHTML = '<h4>Test Dropdown:</h4>';
            testContainer.appendChild(testDropdown);
            document.getElementById('results').appendChild(testContainer);

            try {
                const stylesSnapshot = await db.collection('styles').get();
                
                if (stylesSnapshot.empty) {
                    testDropdown.innerHTML = '<option value="">No styles found</option>';
                    addResult('❌ No styles to populate dropdown', 'error');
                    return false;
                }

                // Clear dropdown and add default option
                testDropdown.innerHTML = '<option value="">Select Style</option>';
                
                // Populate dropdown
                stylesSnapshot.forEach(doc => {
                    const style = doc.data();
                    const styleName = style.stylename || style.name || style.Name || style.StyleName || 'Unknown Style';
                    
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.textContent = styleName;
                    testDropdown.appendChild(option);
                });

                addResult(`✅ Dropdown populated with ${stylesSnapshot.size} styles`, 'success');
                return true;
            } catch (error) {
                testDropdown.innerHTML = '<option value="">Error loading styles</option>';
                addResult(`❌ Dropdown population failed: ${error.message}`, 'error');
                return false;
            }
        }

        async function fixAuthenticationIssue() {
            addResult('🔧 Attempting to fix authentication issue...', 'info');
            
            try {
                // Try to sign in anonymously
                if (auth) {
                    const userCredential = await auth.signInAnonymously();
                    addResult(`✅ Authentication fix successful: ${userCredential.user.uid}`, 'success');
                    
                    // Now test styles collection again
                    await testStylesCollection();
                    await testStylesDropdown();
                } else {
                    addResult('❌ Firebase Auth not available', 'error');
                }
            } catch (error) {
                addResult(`❌ Authentication fix failed: ${error.message}`, 'error');
                
                if (error.code === 'auth/operation-not-allowed') {
                    addResult('', 'error');
                    addResult('🚨 SOLUTION REQUIRED:', 'error');
                    addResult('1. Go to Firebase Console (https://console.firebase.google.com/)', 'info');
                    addResult('2. Select your project: inhsuite', 'info');
                    addResult('3. Go to Authentication > Sign-in method', 'info');
                    addResult('4. Find "Anonymous" provider and click on it', 'info');
                    addResult('5. Toggle "Enable" and click "Save"', 'info');
                    addResult('6. Refresh this page and test again', 'info');
                }
            }
        }

        async function runAllTests() {
            addResult('🚀 Running all tests...', 'info');
            document.getElementById('results').innerHTML = '';
            
            const connectionOk = await testFirebaseConnection();
            if (!connectionOk) return;
            
            const authOk = await testAuthentication();
            const stylesOk = await testStylesCollection();
            
            if (authOk && stylesOk) {
                await testStylesDropdown();
                addResult('🎉 All tests completed successfully!', 'success');
            } else {
                addResult('⚠️ Some tests failed. Check the results above.', 'error');
            }
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            addResult('🔧 Styles Dropdown Diagnostic Tool loaded', 'info');
            addResult('Click "Run All Tests" to start diagnosis', 'info');
        });
    </script>
</body>
</html>
