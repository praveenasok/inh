<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Isolation Test</title>
</head>
<body>
    <h1>Script Isolation Test</h1>
    <div id="status">Testing scripts...</div>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>
    
    <!-- Test 1: Firebase Configuration -->
    <script src="firebase-config.js"></script>
    
    <script>
        document.getElementById('status').innerHTML += '<br>✓ Firebase config loaded';
    </script>
    
    <!-- Test 2: Firebase global initialization -->
    <script src="firebase-global-init.js"></script>
    
    <script>
        document.getElementById('status').innerHTML += '<br>✓ Firebase global init loaded';
    </script>
    
    <!-- Test 3: Firebase Database Service -->
    <script src="firebase-database.js"></script>
    
    <script>
        document.getElementById('status').innerHTML += '<br>✓ Firebase database loaded';
    </script>
    
    <!-- Test 4: Google Sheets Config -->
    <script src="google-sheets-config.js"></script>
    
    <script>
        document.getElementById('status').innerHTML += '<br>✓ Google Sheets config loaded';
    </script>
    
    <!-- Test 5: Firebase Error Handler -->
    <script src="firebase-error-handler.js"></script>
    
    <script>
        document.getElementById('status').innerHTML += '<br>✓ Firebase error handler loaded';
    </script>
    
    <!-- Test 6: Universal Firebase Data Manager -->
    <script src="js/universal-firebase-data-manager.js"></script>
    
    <script>
        document.getElementById('status').innerHTML += '<br>✓ Universal data manager loaded';
    </script>
    
    <!-- Test 7: Local Fallback Manager -->
    <script src="js/local-fallback-manager.js"></script>
    
    <script>
        document.getElementById('status').innerHTML += '<br>✓ Local fallback manager loaded';
    </script>
    
    <!-- Test 8: Fallback Detector -->
    <script src="js/fallback-detector.js"></script>
    
    <script>
        document.getElementById('status').innerHTML += '<br>✓ Fallback detector loaded';
    </script>
    
    <!-- Test 9: Unified Data Access -->
    <script src="js/unified-data-access.js"></script>
    
    <script>
        document.getElementById('status').innerHTML += '<br>✓ Unified data access loaded';
        document.getElementById('status').innerHTML += '<br><strong>Testing unified data access...</strong>';
    </script>
    
    <!-- Test client-management.js (other scripts may already be included) -->
    <script src="client-management.js"></script>
    <script>console.log('✓ client-management.js loaded successfully');</script>
</body>
</html>
