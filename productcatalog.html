    <style>
        /* Responsive padding */
        .mobile-padding {
            padding: 1.5rem;
        }
        @media (max-width: 640px) {
            .mobile-padding {
                padding: 1rem;
            }
        }
        
        /* Shadow effects */
        .shadow-soft {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        /* Button styles now handled by unified-button-system.css */
        
        /* Mobile-first responsive design */
        @media (max-width: 768px) {
            .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            .text-responsive {
                font-size: 0.875rem;
            }
        }
        
        /* Form elements */
        .form-input {
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            padding: 0.75rem;
            transition: all 0.3s ease;
            background: white;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        /* Card hover effects */
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        /* Navigation styles now handled by unified-button-system.css */
        
        /* Module content display */
        .module-content {
            display: block;
        }
        
        /* Navigation link styles */
        .nav-btn {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 12px 16px;
            font-weight: 500;
            cursor: pointer;
            touch-action: manipulation;
            border-radius: 8px;
            transition: all 0.2s ease;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            border: 2px solid #e2e8f0;
            box-shadow: 0 4px 12px rgba(71, 85, 105, 0.15);
        }
        
        .nav-btn:hover {
            text-decoration: none;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            border-color: #cbd5e1;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(71, 85, 105, 0.2);
        }
        
        .nav-btn.nav-btn-active {
            background: #081249;
            color: white !important;
            border: 2px solid #081249;
            box-shadow: 0 4px 12px rgba(8, 18, 73, 0.3);
        }
        
        .nav-btn.nav-btn-active:hover {
            background: #0a1555;
            border-color: #0a1555;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(8, 18, 73, 0.4);
        }
        
        /* Remove default link styles */
        .no-underline {
            text-decoration: none !important;
        }
        
        .no-underline:hover {
            text-decoration: none !important;
        }
        
        /* Loading Overlay */
        .loading {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #081249;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Hamburger Menu Styles */
        .hamburger-menu {
            display: none;
            flex-direction: column;
            cursor: pointer;
            padding: 8px;
            z-index: 1001;
        }

        .hamburger-line {
            width: 25px;
            height: 3px;
            background-color: white;
            margin: 3px 0;
            transition: 0.3s;
            border-radius: 2px;
        }

        .hamburger-menu.active .hamburger-line:nth-child(1) {
            transform: rotate(-45deg) translate(-5px, 6px);
        }

        .hamburger-menu.active .hamburger-line:nth-child(2) {
            opacity: 0;
        }

        .hamburger-menu.active .hamburger-line:nth-child(3) {
            transform: rotate(45deg) translate(-5px, -6px);
        }

        }

        }

            color: #dc2626;

                flex-wrap: wrap;
            }
            
            #catalog-results-count {
                font-size: 0.75rem;
                text-align: center;
            }
        }

        /* Loading state animation for dropdown */
        #catalog-category.loading {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24'%3e%3ccircle cx='12' cy='12' r='10' stroke='%236b7280' stroke-width='4' fill='none' opacity='0.25'/%3e%3cpath fill='%233b82f6' d='M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z'/%3e%3c/svg%3e");
            background-size: 1.25em 1.25em;
            animation: spin 1s linear infinite;
        }

        /* Retry button styles */
        .retry-button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .retry-button:hover {
            background-color: #2563eb;
        }

        .retry-button:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
        }

        /* Mobile Menu Styles */
        .mobile-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 50%, #d97706 100%);
            padding: 1rem;
            transform: translateY(-100%);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .mobile-menu.active {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
            animation: slideDown 0.3s ease forwards;
        }

        .mobile-menu a {
            display: block;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 8px;
            transition: background-color 0.2s ease;
            text-decoration: none;
        }

        .mobile-menu a:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Desktop Menu Styles */
        .desktop-menu {

        /* Responsive Design */
        @media (max-width: 768px) {
            .desktop-menu {

                display: flex;
            }
        }

        @media (min-width: 769px) {
            .mobile-menu {
                display: none !important;
            }
        }
    </style>
</head>

    <script>
        // Data arrays for consistency
    // Function to get product image based on category and product name
    function getProductImage(category, productName) {
        const categoryImageMap = {
            'Bulk': 'images/Products/Bulk.png',
            'Weaves': 'images/Products/Weaves-SD.png',
            'Weaves DD': 'images/Products/Weaves-DD.png',
            'Weaves SDD': 'images/Products/Weaves-SDD.png',
            'Tapes': 'images/Products/Tapes.png',
            'ClipOn': 'images/Products/ClipOn.png',
            'Closures': 'images/Products/Closure.png',
            'Frontals': 'images/Products/Frontal.png',
            'Frontline': 'images/Products/Frontline.png',
            'Tips': 'images/Products/ITIPS.png',
            'I Tips': 'images/Products/ITIPS.png',
            'U Tips': 'images/Products/UTIPS.png',
            'Y Tips': 'images/Products/YTIPS.png',
            'Flat Tips': 'images/Products/FlatTips.png',
            'Nano': 'images/Products/Nano.png',
            'PonyTail': 'images/Products/PonyTail.png',
            'BUN': 'images/Products/BUN.png',
            'Curly Bun': 'images/Products/CurlyBun.png',
            'Clutch Bun': 'images/Products/ClutchBun.png',
            'Bangs': 'images/Products/Bangs.png',
            'Halo': 'images/Products/Halo.png',
            'Highlights': 'images/Products/Highlights.png',
            'Cover Patch': 'images/Products/CoverPatch.png',
            'Genius': 'images/Products/Genius.png',
            'Genius Weaves': 'images/Products/Genius.png',
            'Wigs': 'images/Products/WIGFRONTAL.png',
            'Wig Closure': 'images/Products/WIGCLOSURE.png',
            'Wig Frontal': 'images/Products/WIGFRONTAL.png',
            'Silk Topper': 'images/Products/SILKTOPPER.png',
            'Toppers': 'images/Products/SILKTOPPER.png',
            'Flat Clip Ponytail': 'images/Products/FLATCLIPPONYTAIL.png',
            'Hair Extensions': 'images/Products/Weaves-SD.png'
        };
        
        // Check for specific product name matches first
        const productLower = productName.toLowerCase();
        if (productLower.includes('bulk')) return 'images/Products/Bulk.png';
        if (productLower.includes('weave') && productLower.includes('double drawn')) return 'images/Products/Weaves-DD.png';
        if (productLower.includes('weave') && productLower.includes('super double')) return 'images/Products/Weaves-SDD.png';
        if (productLower.includes('weave')) return 'images/Products/Weaves-SD.png';
        if (productLower.includes('tape')) return 'images/Products/Tapes.png';
        if (productLower.includes('closure')) return 'images/Products/Closure.png';
        if (productLower.includes('frontal')) return 'images/Products/Frontal.png';
        if (productLower.includes('genius')) return 'images/Products/Genius.png';

    // Function to calculate ranges for a category
    function calculateCategoryRanges(category) {
        const categoryProducts = productData.filter(p => p.Category === category);
        
        if (categoryProducts.length === 0) {
            return {
                priceRange: 'N/A',
                lengthRange: 'N/A',
                colorRange: 'N/A',
                styleRange: 'N/A'
            };
        }
        
        // Calculate price range
        const prices = categoryProducts.map(p => p.Rate).filter(Boolean);
        const priceRange = prices.length > 1 ? 
            `${SYMBOL[categoryProducts[0].Currency] || ''}${Math.min(...prices)} - ${SYMBOL[categoryProducts[0].Currency] || ''}${Math.max(...prices)}` :
            `${SYMBOL[categoryProducts[0].Currency] || ''}${prices[0] || 'N/A'}`;
        
        // Calculate length range
        const lengths = categoryProducts.map(p => p.Length).filter(Boolean);
        const lengthRange = lengths.length > 1 ? 
            `${Math.min(...lengths)}" - ${Math.max(...lengths)}"` :
            `${lengths[0] || 'N/A'}"`;
        
        // Use Firebase collections for color and style counts
        const colorRange = firebaseColors.length > 0 ? 
            `${firebaseColors.length} colors available` :
            'Colors available';
        
        const styleRange = firebaseStyles.length > 0 ? 
            `${firebaseStyles.length} styles available` :
            'Styles available';
        
        return { priceRange, lengthRange, colorRange, styleRange };
    }

            } else if (categories.length === 0) {

            // Final fallback to window.productData
            if (categories.length === 0 && window.productData && Array.isArray(window.productData)) {

                categories = [...new Set(window.productData

            // Final check: if we still have no categories, something is seriously wrong

    // Load categories using unified data source with retry mechanism
    async function loadCategoriesWithRetry(maxRetries = 3) {
        const categorySelect = document.getElementById('catalog-category');
        if (!categorySelect) return;

        for (let attempt = 1; attempt <= maxRetries; attempt++) {
            try {
                // Show loading state with attempt number
                if (attempt > 1) {
                    categorySelect.innerHTML = `<option value="">Retrying... (${attempt}/${maxRetries})</option>`;
                }

                // Wait for unified data to be available
                await waitForUnifiedData();

                // Populate categories using unified data source
                await populateCatalogCategories();
                return; // Success, exit retry loop

            } catch (error) {
                console.warn(`Category loading attempt ${attempt} failed:`, error);
                
                if (attempt === maxRetries) {
                    // Final attempt failed, provide default categories
                    console.log('🔧 All retry attempts failed, providing default categories');
                    try {
                        const defaultCategories = ['Bulk', 'Weaves', 'Weaves DD', 'Tapes', 'Closures', 'Frontals', 'I Tips', 'ClipOn', 'Genius Weaves', 'Toppers'];
                        
                        categorySelect.innerHTML = '<option value="">All Categories</option>';
                        defaultCategories.forEach((category) => {
                            const option = document.createElement('option');
                            option.value = category;
                            option.textContent = category;
                            categorySelect.appendChild(option);
                        });
                        
                        categorySelect.disabled = false;
                        updateCategoryCount(defaultCategories.length);
                        showCategorySuccess(`${defaultCategories.length} default categories loaded`);
                        
                        console.log('✅ Default categories loaded after retry failure');
                    } catch (finalError) {
                        console.error('❌ Critical error in retry final fallback:', finalError);
                        showCategoryError('Unable to load categories after multiple attempts');
                        categorySelect.innerHTML = '<option value="">All Products</option>';
                        categorySelect.disabled = false;
                    }
                } else {
                    // Wait before next attempt
                    await new Promise(resolve => setTimeout(resolve, 1000 * attempt));
                }
            }
        }
    }

    // Wait for unified data to be available
    async function waitForUnifiedData(timeout = 10000) {
        const startTime = Date.now();
        
        while (Date.now() - startTime < timeout) {
            // Check if unifiedDataAccess is available and ready
            if (window.unifiedDataAccess && typeof window.unifiedDataAccess.getCategories === 'function') {
                try {
                    const categories = await window.unifiedDataAccess.getCategories();
                    if (categories && Array.isArray(categories) && categories.length > 0) {
                        return true;
                    }
                } catch (error) {
                    console.warn('Error checking unifiedDataAccess:', error);
                }
            }
            
            // Check if universalDataManager is available and has data
            if (window.universalDataManager) {
                try {
                    const status = window.universalDataManager.getStatus();
                    if (status.isDataLoaded) {
                        const products = window.universalDataManager.getProductData();
                        if (products && Array.isArray(products) && products.length > 0) {
                            return true;
                        }
                    }
                } catch (error) {
                    console.warn('Error checking universalDataManager status:', error);
                }
            }
            
            // Fallback check for window.productData
            if (window.productData && Array.isArray(window.productData) && window.productData.length > 0) {
                return true;
            }
            
            // Wait 500ms before next check
            await new Promise(resolve => setTimeout(resolve, 500));
        }
        
        throw new Error('Unified data not available within timeout period');
    }

    // Show category loading success message
    function showCategorySuccess(message) {
        const resultsCount = document.getElementById('catalog-results-count');
        if (resultsCount) {
            resultsCount.innerHTML = `<span class="text-green-600"><i class="fas fa-check-circle mr-1"></i>${message}</span>`;
            
            // Clear success message after 3 seconds
            setTimeout(() => {
                updateCategoryCount();
            }, 3000);
        }
    }

    // Show category loading error message
    function showCategoryError(message) {
        const categorySelect = document.getElementById('catalog-category');
        const resultsCount = document.getElementById('catalog-results-count');
        
        if (categorySelect) {
            categorySelect.innerHTML = `<option value="">Error: ${message}</option>`;
            categorySelect.disabled = true;
        }
        
        if (resultsCount) {
            resultsCount.innerHTML = `<span class="text-red-600"><i class="fas fa-exclamation-triangle mr-1"></i>${message}</span>`;
        }

        // Show retry button
        showCategoryRetryButton();
    }

    // Update category count display
    function updateCategoryCount(count = null) {
        const resultsCount = document.getElementById('catalog-results-count');
        if (!resultsCount) return;

        if (count !== null) {
            resultsCount.innerHTML = `${count} categories available`;
        } else {
            // Calculate current count from dropdown
            const categorySelect = document.getElementById('catalog-category');
            if (categorySelect) {
                const optionCount = categorySelect.options.length - 1; // Subtract "All Categories" option
                resultsCount.innerHTML = optionCount > 0 ? `${optionCount} categories available` : 'Loading categories...';
            }
        }
    }

    // Show retry button for category loading
    function showCategoryRetryButton() {
        const resultsCount = document.getElementById('catalog-results-count');
        if (!resultsCount) return;

        const retryButton = document.createElement('button');
        retryButton.className = 'ml-2 px-3 py-1 bg-blue-500 text-white text-xs rounded hover:bg-blue-600 transition-colors';
        retryButton.innerHTML = '<i class="fas fa-redo mr-1"></i>Retry';
        retryButton.onclick = () => {
            retryButton.remove();
            loadCategoriesWithRetry();
        };

        resultsCount.appendChild(retryButton);
    }

    // Enhanced category change handler with loading feedback
    function onCategoryChange() {
        const categorySelect = document.getElementById('catalog-category');
        if (!categorySelect) return;

        const selectedCategory = categorySelect.value;
        
        // Show loading state
        const resultsCount = document.getElementById('catalog-results-count-display');
        if (resultsCount) {
            resultsCount.innerHTML = 'Filtering products...';
        }

        // Apply filters with selected category
        setTimeout(() => {
            applyCatalogFilters();
        }, 100);
    }

    // Show error message to user
    function showErrorMessage(message) {
        const catalogGrid = document.getElementById('catalog-grid');
        if (catalogGrid) {
            catalogGrid.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-12 text-center">
                    <div class="bg-red-50 border border-red-200 rounded-lg p-6 max-w-md">
                        <div class="flex items-center justify-center w-12 h-12 mx-auto mb-4 bg-red-100 rounded-full">
                            <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-red-800 mb-2">Connection Error</h3>
                        <p class="text-red-700 mb-4">${message}</p>
                        <button onclick="location.reload()" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors">
                            Try Again
                        </button>
                    </div>
                </div>
            `;
        }
    }
        
    // Apply catalog filters
    async function applyCatalogFilters() {
        const category = document.getElementById('catalog-category').value;
        const search = document.getElementById('catalog-search').value.toLowerCase();
        
        let filteredProducts = productData;
        
        // Filter by category
        if (category) {
            filteredProducts = filteredProducts.filter(product => product.Category === category);
        }
        
        // Filter by search term
        if (search) {
            filteredProducts = filteredProducts.filter(product => 
                product.Product.toLowerCase().includes(search) ||
                product.Category.toLowerCase().includes(search) ||
                (product.Colors && product.Colors.toLowerCase().includes(search))
            );
        }
        
        await renderProducts(filteredProducts);
    }
    
    function clearCatalogFilters() {
        document.getElementById('catalog-category').value = '';
        document.getElementById('catalog-search').value = '';
        renderProducts();
    }
    
    // Firebase Readiness Check
    function waitForFirebase() {
        return new Promise((resolve) => {
            if (window.globalFirebase && window.globalFirebase.isAvailable()) {
                resolve();
            } else {
                // Wait for global Firebase to be ready
                const checkInterval = setInterval(() => {
                    if (window.globalFirebase && window.globalFirebase.isAvailable()) {
                        clearInterval(checkInterval);
                        resolve();
                    }
                }, 100);
                
                // Fallback timeout
                setTimeout(() => {
                    clearInterval(checkInterval);
                    resolve();
                }, 5000);
            }
        });
    }

    // Enhanced initialization with category loading
    document.addEventListener('DOMContentLoaded', async function() {
        try {
            // Wait for Firebase to be available
            await waitForFirebase();
            
            // Initialize enhanced category loading with retry mechanism
            await loadCategoriesWithRetry();
            
            // Set up event listeners for filters
            const categorySelect = document.getElementById('catalog-category');
            if (categorySelect) {
                categorySelect.addEventListener('change', onCategoryChange);
            }
            
            // Search filter
            const searchInput = document.getElementById('catalog-search');
            if (searchInput) {
                searchInput.addEventListener('input', applyCatalogFilters);
            }
            
            // Filter button
            const filterBtn = document.getElementById('catalog-filter-btn');
            if (filterBtn) {
                filterBtn.addEventListener('click', applyCatalogFilters);
            }
            
            // Clear button
            const clearBtn = document.getElementById('catalog-clear-btn');
            if (clearBtn) {
                clearBtn.addEventListener('click', clearCatalogFilters);
            }

            console.log('Product catalog initialized successfully with enhanced category dropdown');
            
        } catch (error) {
            console.error('Error initializing product catalog:', error);
            showCategoryError('Failed to initialize catalog');
        }
    });
    </script>

  // Initialize Sync Status UI bound to INHDATA metrics once DOM is ready
  document.addEventListener('DOMContentLoaded', async function() {
    try {
      const syncUI = new SyncStatusUI({ containerId: 'sync-status-container', logLevel: 'warn', updateInterval: 4000 });
      const syncCoordinator = {
        async getStatus() {
          const metrics = (INHDATA && INHDATA.metrics) || {};
          const lastSyncErr = metrics.lastSyncError ? [{ timestamp: Date.now(), message: metrics.lastSyncError }] : [];
          return {
            isInitialized: !!INHDATA,
            isSyncing: !!(INHDATA && INHDATA.syncing),
            isSuspended: !!(INHDATA && INHDATA.syncSuspended),
            lastSync: (INHDATA && INHDATA.lastSync) || null,
            errors: lastSyncErr,
            stats: {
              totalRecords: (metrics.localReads || 0) + (metrics.remoteReads || 0),
              pendingChanges: metrics.pendingChanges || 0,
              successfulSyncs: metrics.successfulSyncs || 0,
              failedSyncs: metrics.failedSyncs || 0,
            },
            recentActivity: (INHDATA && INHDATA.recentActivity) || []
          };
        },
        async performIncrementalSync() { if (INHDATA && INHDATA.syncNow) { await INHDATA.syncNow({ full: false }); } },
        async performFullSync() { if (INHDATA && INHDATA.syncNow) { await INHDATA.syncNow({ full: true }); } },
        async suspendSync() { if (INHDATA && INHDATA.suspend) { await INHDATA.suspend(true); } },
        async resumeSync() { if (INHDATA && INHDATA.suspend) { await INHDATA.suspend(false); } }
      };
      await syncUI.initialize(syncCoordinator);
    } catch (e) {
      console.warn('SyncStatusUI init failed:', e.message);
    }
  });

            el.innerHTML = `<option value="">${placeholder || 'Select'}</option>`;

          });

          INHDATA.subscribe('priceLists', (list) => {
