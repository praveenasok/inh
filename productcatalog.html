    <!-- Unified Button System -->

    <style>
        /* Responsive padding */
        .mobile-padding {
            padding: 1.5rem;
        }
        @media (max-width: 640px) {
            .mobile-padding {
                padding: 1rem;
            }
        }
        
        /* Shadow effects */
        .shadow-soft {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        /* Button styles now handled by unified-button-system.css */
        
        /* Mobile-first responsive design */
        @media (max-width: 768px) {
            .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            .text-responsive {
                font-size: 0.875rem;
            }
        }
        
        /* Form elements */
        .form-input {
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            padding: 0.75rem;
            transition: all 0.3s ease;
            background: white;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        /* Card hover effects */
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        /* Navigation styles now handled by unified-button-system.css */
        
        /* Module content display */
        .module-content {
            display: block;
        }
        
        /* Navigation link styles */
        .nav-btn {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 12px 16px;
            font-weight: 500;
            cursor: pointer;
            touch-action: manipulation;
            border-radius: 8px;
            transition: all 0.2s ease;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            border: 2px solid #e2e8f0;
            box-shadow: 0 4px 12px rgba(71, 85, 105, 0.15);
        }
        
        .nav-btn:hover {
            text-decoration: none;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            border-color: #cbd5e1;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(71, 85, 105, 0.2);
        }
        
        .nav-btn.nav-btn-active {
            background: #081249;
            color: white !important;
            border: 2px solid #081249;
            box-shadow: 0 4px 12px rgba(8, 18, 73, 0.3);
        }
        
        .nav-btn.nav-btn-active:hover {
            background: #0a1555;
            border-color: #0a1555;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(8, 18, 73, 0.4);
        }
        
        /* Remove default link styles */
        .no-underline {
            text-decoration: none !important;
        }
        
        .no-underline:hover {
            text-decoration: none !important;
        }
        
        /* Loading Overlay */
        .loading {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #081249;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Hamburger Menu Styles */
        .hamburger-menu {
            display: none;
            flex-direction: column;
            cursor: pointer;
            padding: 8px;
            z-index: 1001;
        }

        .hamburger-line {
            width: 25px;
            height: 3px;
            background-color: white;
            margin: 3px 0;
            transition: 0.3s;
            border-radius: 2px;
        }

        .hamburger-menu.active .hamburger-line:nth-child(1) {
            transform: rotate(-45deg) translate(-5px, 6px);
        }

        .hamburger-menu.active .hamburger-line:nth-child(2) {
            opacity: 0;
        }

        .hamburger-menu.active .hamburger-line:nth-child(3) {
            transform: rotate(45deg) translate(-5px, -6px);
        }

        /* Enhanced Category Dropdown Styles */
        #catalog-category {
            position: relative;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        #catalog-category:disabled {
            background-color: #f9fafb;
            color: #6b7280;
            cursor: not-allowed;
            opacity: 0.7;
        }

        #catalog-category:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
        }

        /* Category status indicators */
        .category-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .category-status .text-green-600 {
            color: #059669;
        }

        .category-status .text-red-600 {
            color: #dc2626;
        }

        .category-status .text-yellow-600 {
            color: #d97706;
        }

        /* Responsive dropdown improvements */
        @media (max-width: 768px) {
            #catalog-category {
                font-size: 16px; /* Prevents zoom on iOS */
                min-height: 44px; /* Touch-friendly size */
            }
            
            .category-status {
                font-size: 0.75rem;
                flex-wrap: wrap;
            }
            
            #catalog-results-count {
                font-size: 0.75rem;
                text-align: center;
            }
        }

        /* Loading state animation for dropdown */
        #catalog-category.loading {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24'%3e%3ccircle cx='12' cy='12' r='10' stroke='%236b7280' stroke-width='4' fill='none' opacity='0.25'/%3e%3cpath fill='%233b82f6' d='M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z'/%3e%3c/svg%3e");
            background-size: 1.25em 1.25em;
            animation: spin 1s linear infinite;
        }

        /* Retry button styles */
        .retry-button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .retry-button:hover {
            background-color: #2563eb;
        }

        .retry-button:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
        }

        /* Mobile Menu Styles */
        .mobile-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 50%, #d97706 100%);
            padding: 1rem;
            transform: translateY(-100%);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .mobile-menu.active {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
            animation: slideDown 0.3s ease forwards;
        }

        .mobile-menu a {
            display: block;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 8px;
            transition: background-color 0.2s ease;
            text-decoration: none;
        }

        .mobile-menu a:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Desktop Menu Styles */
        .desktop-menu {
            display: flex;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .desktop-menu {
                display: none;
            }
            
            .hamburger-menu {
                display: flex;
            }
        }

        @media (min-width: 769px) {
            .mobile-menu {
                display: none !important;
            }
        }
    </style>
</head>

    <script>
        // Data arrays for consistency
    // Function to get product image based on category and product name
    function getProductImage(category, productName) {
        const categoryImageMap = {
            'Bulk': 'images/Products/Bulk.png',
            'Weaves': 'images/Products/Weaves-SD.png',
            'Weaves DD': 'images/Products/Weaves-DD.png',
            'Weaves SDD': 'images/Products/Weaves-SDD.png',
            'Tapes': 'images/Products/Tapes.png',
            'ClipOn': 'images/Products/ClipOn.png',
            'Closures': 'images/Products/Closure.png',
            'Frontals': 'images/Products/Frontal.png',
            'Frontline': 'images/Products/Frontline.png',

    function normalizeImagePath(path) {
        const v = (path || '').toString().trim();
        if (!v) return '';
        if (/^https?:\/\//i.test(v)) return v;
        const noLeading = v.replace(/^\/+/, '');
        if (noLeading.toLowerCase().startsWith('images/')) return noLeading;
        return `images/Products/${noLeading.replace(/^images\/products\//i, '')}`;
    }

    function resolveProductImage(product) {
        const candidates = [product.image, product.Image, product.imageUrl, product.ImageURL];
        const first = candidates.find(x => x && String(x).trim().length);
        if (first) {
            const normalized = normalizeImagePath(first);
            if (normalized) return normalized;
        }
        const mapped = (window.productImageMapping && window.productImageMapping.getProductImagePath(
            product.Category || '',
            product.Product || '',
            product.Density || ''
        )) || '';
        return mapped || getCategoryImage(product.Category || '');
    }

    // Function to calculate ranges for a category
    function calculateCategoryRanges(category) {
        const categoryProducts = productData.filter(p => p.Category === category);
        
        if (categoryProducts.length === 0) {
            return {
                priceRange: 'N/A',
                lengthRange: 'N/A',
                colorRange: 'N/A',
                styleRange: 'N/A'
            };
        }

        // Currency conversion helpers
        const getCatalogCurrency = () => (document.getElementById('catalog-currency')?.value) || (DEFAULT_RATES?.base || 'INR');
        const getRates = () => {
            const r = (window.catalogExchangeRates && (window.catalogExchangeRates.rates || window.catalogExchangeRates)) || DEFAULT_RATES.rates;
            return r || DEFAULT_RATES.rates;
        };
        const convertAmount = (amt, from, to) => {
            const rates = getRates();
            const fromRate = rates[from] || 1;
            const toRate = rates[to] || 1;
            const inr = amt / fromRate;
            return inr * toRate;
        };

        // Calculate price range (converted to selected currency)
        const targetCurrency = getCatalogCurrency();
        const pricesConverted = categoryProducts
            .map(p => {
                const base = Number(p.Rate);
                const fromCur = p.Currency || 'INR';
                if (!Number.isFinite(base)) return null;
                return convertAmount(base, fromCur, targetCurrency);
            })
            .filter(v => v !== null && v !== undefined && Number.isFinite(v));
        const priceRange = pricesConverted.length > 1 ? 
            `${SYMBOL[targetCurrency] || ''}${Math.min(...pricesConverted).toFixed(2)} - ${SYMBOL[targetCurrency] || ''}${Math.max(...pricesConverted).toFixed(2)}` :
            `${SYMBOL[targetCurrency] || ''}${(pricesConverted[0] ?? 'N/A') && Number.isFinite(pricesConverted[0]) ? pricesConverted[0].toFixed(2) : 'N/A'}`;
        
        // Calculate length range
        const lengths = categoryProducts.map(p => p.Length).filter(Boolean);
        const lengthRange = lengths.length > 1 ? 
            `${Math.min(...lengths)}" - ${Math.max(...lengths)}"` :
            `${lengths[0] || 'N/A'}"`;
        
        // Use Firebase collections for color and style counts
        const colorRange = firebaseColors.length > 0 ? 
            `${firebaseColors.length} colors available` :
            'Colors available';
        
        const styleRange = firebaseStyles.length > 0 ? 
            `${firebaseStyles.length} styles available` :
            'Styles available';
        
        return { priceRange, lengthRange, colorRange, styleRange };
    }

    // Robust loader: tries INHDATA with retries, falls back gracefully
    async function loadCategoriesWithRetry(maxRetries = 3, baseDelayMs = 500) {
        const select = document.getElementById('catalog-category');
        if (!select) return false;
        try { setCategoryLoadingState(true); } catch (_) {}
        let lastError = null;
        for (let attempt = 0; attempt < maxRetries; attempt++) {
            try {
                if (!isINHDATAReady()) throw new Error('INHDATA not ready');
                const names = await INHDATA.distinct('products', 'Category');
                const categories = (Array.isArray(names) ? names : []).filter(Boolean).map(c => String(c)).sort((a,b) => a.localeCompare(b));
                if (categories.length > 0) {
                    setDropdownOptions(select, categories, 'All Categories');
                    try { updateCategoryCount(categories.length); } catch (_) {}
                    try { localStorage.setItem('catalogCategories', JSON.stringify(categories)); } catch (_) {}
                    try { select.disabled = false; } catch (_) {}
                    try { showCategorySuccess(`${categories.length} categories loaded`); } catch (_) {}
                    try { setCategoryLoadingState(false); } catch (_) {}
                    return true;
                }
                throw new Error('No categories returned');
            } catch (err) {
                lastError = err;
                const delay = baseDelayMs * Math.pow(2, attempt);
                await new Promise(r => setTimeout(r, delay));
            }
        }
        // Fallback path
        try {
            const fallback = getFallbackCategories();
            setDropdownOptions(select, fallback, 'All Categories');
            try { updateCategoryCount(fallback.length); } catch (_) {}
            try { select.disabled = false; } catch (_) {}
            // Show a non-blocking warning instead of error that clears the dropdown
            try { showCategoryWarning(`Loaded ${fallback.length} fallback categories. ${lastError ? lastError.message : ''}`); } catch (_) {}
        } catch (_) {}
        try { setCategoryLoadingState(false); } catch (_) {}
        return false;
    }

    function refreshDerivedFilterOptions(products) {
        try {

            const prev = {
                product: productSelect?.value || '',
                density: densitySelect?.value || '',
                shade: shadeSelect?.value || '',

                .map(p => p && (p.Product || p['Product Name'] || p.Name || p.Item))

                .sort((a,b)=>String(a).localeCompare(String(b)));

                .map(p => p && (p.Density || p['Hair Density'] || p['Density Options']))
                .filter(Boolean)))
                .sort((a,b)=>String(a).localeCompare(String(b)));

            const shades = Array.from(new Set((products || [])
                .flatMap(p => String(p && (p.Colors || p['Color Options'] || '')).split(/[,/|]/)
                    .map(s => s.trim()).filter(Boolean))) )
                .sort((a,b)=>String(a).localeCompare(String(b)));

            if (productSelect) { setOptionsGlobal(productSelect, productNames, 'All Products'); if (prev.product && productNames.includes(prev.product)) productSelect.value = prev.product; }
            if (densitySelect) { setOptionsGlobal(densitySelect, densities, 'All Densities'); if (prev.density && densities.includes(prev.density)) densitySelect.value = prev.density; }
            if (shadeSelect) { setOptionsGlobal(shadeSelect, shades, 'All Shades'); if (prev.shade && shades.includes(prev.shade)) shadeSelect.value = prev.shade; }
        } catch (_) {}

    // Apply catalog filters
    async function applyCatalogFilters() {
        const category = document.getElementById('catalog-category').value;
        const search = (document.getElementById('catalog-search').value || '').toLowerCase();
        const priceList = document.getElementById('catalog-price-list')?.value || '';
        const productName = document.getElementById('catalog-product')?.value || '';
        const densitySel = document.getElementById('catalog-density')?.value || '';
        const shadeSel = document.getElementById('catalog-shade')?.value || '';
        const normalize = (s) => String(s || '').trim().toLowerCase();

        let filteredProducts = Array.isArray(window.catalogProducts) ? window.catalogProducts : (Array.isArray(window.productData) ? window.productData : []);

        // Filter by category (robust, case-insensitive)
        if (category) {
            const catNorm = normalize(category);
            filteredProducts = filteredProducts.filter(product => normalize(product.Category) === catNorm);
        }

        // Filter by search term
        if (search) {
            filteredProducts = filteredProducts.filter(product => 
                (product.Product && product.Product.toLowerCase().includes(search)) ||
                (product.Category && product.Category.toLowerCase().includes(search)) ||
                (product.Colors && product.Colors.toLowerCase().includes(search))
            );
        }

        // Filter by Price List
        if (priceList) {
            const plNorm = normalize(priceList);
            filteredProducts = filteredProducts.filter(p => {
                const plVal = p.PriceListName || p.PriceList || p['Price List Name'] || '';
                return normalize(plVal) === plNorm;
            });
        }

        // Filter by Product
        if (productName) {
            const prodNorm = normalize(productName);
            filteredProducts = filteredProducts.filter(p => normalize(p.Product || p['Product Name'] || p.Name || p.Item) === prodNorm);
        }

        // Filter by Density
        if (densitySel) {
            const dNorm = normalize(densitySel);
            filteredProducts = filteredProducts.filter(p => normalize(p.Density || p['Hair Density'] || p['Density Options']) === dNorm);
        }

        // Filter by Shade/Color (supports comma-separated lists)
        if (shadeSel) {
            const sNorm = normalize(shadeSel);
            filteredProducts = filteredProducts.filter(p => {
                const raw = p.Colors || p['Color Options'] || '';
                const parts = String(raw).split(/[,/|]/).map(x => normalize(x)).filter(Boolean);
                return parts.includes(sNorm);
            });
        }

        await renderProducts(filteredProducts);
    }

            const ready = await waitForINHDATAReady(6000, 200);
            if (ready) {
                const ok = await loadCategoriesWithRetry(3, 500);
                if (!ok) {
                    console.warn('INHDATA categories failed, using fallback.');
                }
            } else {
                console.warn('INHDATA not ready within timeout, keeping fallback categories.');
            }
            try { setCategoryLoadingState(false); } catch (_) {}
        } catch (error) {
            console.error('Error initializing product catalog UI:', error);
            showCategoryError('Failed to initialize catalog UI');
        }
    });

    // Load exchange rates for currency converter (INR base)
    async function loadCatalogExchangeRates(base = 'INR') {
        try {
            const resp = await fetch(`https://open.er-api.com/v6/latest/${base}`);
            const data = await resp.json();
            if (data && (data.rates || data.result === 'success')) {
                window.catalogExchangeRates = { base, rates: data.rates || {} };
            } else {
                window.catalogExchangeRates = DEFAULT_RATES;
            }
        } catch (e) {
            window.catalogExchangeRates = DEFAULT_RATES;
        }
    }

    function setCategoryLoadingState(isLoading) {

            categorySelect.disabled = false;

    <script>
      // INHDATA integration: initialize and wire subscriptions for catalog rendering
      document.addEventListener('DOMContentLoaded', async function() {
        try {
          window.forceINHDATA = true;
          await INHDATA.initialize();

          function setOptions(el, values, placeholder) {
            if (!el) return;
            el.innerHTML = `<option value="">${placeholder || 'Select'}</option>`;
            (values || []).forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; el.appendChild(o); });
          }

          // Helper: refresh category dropdown from live products without losing fallback
          function refreshCategoryOptionsFromProducts(products) {
            const categorySelect = document.getElementById('catalog-category');
            if (!categorySelect) return;

            const previous = categorySelect.value;
            const categories = Array.from(new Set((products || [])
              .map(p => (p && p.Category ? String(p.Category).trim() : ''))
              .filter(Boolean)))
              .sort((a,b)=>a.localeCompare(b));

            if (categories.length) {
              setOptions(categorySelect, categories, 'All Categories');
              try { updateCategoryCount(categories.length); } catch (_) {}
              if (previous && categories.includes(previous)) {
                categorySelect.value = previous;
              }
            } else {
              // Fall back to existing logic if INHDATA has no categories yet
              try { if (typeof populateCategoryFilterFallback === 'function') { populateCategoryFilterFallback(); } } catch (_) {}
            }

            try { setCategoryLoadingState(false); } catch (_) {}
          }

          // Products → drive catalog list/grid
          INHDATA.subscribe('products', (products) => {
            try { window.catalogProducts = Array.isArray(products) ? products : []; window.productData = window.catalogProducts; } catch (_) {}
            // Refresh dropdown options from live data
            try { refreshCategoryOptionsFromProducts(window.catalogProducts); } catch (_) {}
            // Populate derived filter options
            try { if (typeof refreshDerivedFilterOptions === 'function') { refreshDerivedFilterOptions(window.catalogProducts); } } catch (_) {}
            // Keep rendering in sync
            try { if (typeof renderCatalog === 'function') { renderCatalog(window.catalogProducts); } } catch (_) {}
            try { if (typeof renderProducts === 'function') { renderProducts(window.catalogProducts); } } catch (_) {}
          });

          // Price lists → optional filters derived from products
          INHDATA.subscribe('products', async () => {
            try {
              const names = await INHDATA.distinct('products', ['PriceList','Price List Name','PriceListName']);
              setOptions(document.getElementById('catalog-price-list'), names, 'All Price Lists');
              updateCategoryCount();
            } catch (_) {}
          });

          // Categories derived from products
          let initial = await INHDATA.getAll('products');
          window.catalogProducts = Array.isArray(initial) ? initial : [];
          // Offline fallback: seed minimal sample products if none are available
          try {
            if (!Array.isArray(window.catalogProducts) || window.catalogProducts.length === 0) {
              const samples = [
                { id: 'SAMPLE-INDIA25-Bulk-100', PriceListName: 'INDIA25', Category: 'Bulk', Product: 'Bulk', Density: '100%', Shade: 'Natural Black', Rate: 100, SoldinKG: 'Y', updatedAt: Date.now() },
                { id: 'SAMPLE-INDIA25-Tapes-130', PriceListName: 'INDIA25', Category: 'Tapes', Product: 'Tapes', Density: '130%', Shade: 'Natural Black', Rate: 160, SoldinKG: 'N', updatedAt: Date.now() },
                { id: 'SAMPLE-INDIA25-Closures-120', PriceListName: 'INDIA25', Category: 'Closures', Product: 'Lace Closure', Density: '120%', Shade: 'Brown', Rate: 220, SoldinKG: 'N', updatedAt: Date.now() },
                { id: 'SAMPLE-INDIA25-ClipOn-130', PriceListName: 'INDIA25', Category: 'ClipOn', Product: 'ClipOn', Density: '130%', Shade: 'Brown', Rate: 180, SoldinKG: 'N', updatedAt: Date.now() }
              ];
              for (const doc of samples) { try { await INHDATA.upsert('products', doc); } catch (_) {} }
              initial = await INHDATA.getAll('products');
              window.catalogProducts = Array.isArray(initial) ? initial : [];
            }
          } catch (_) {}
          try { refreshCategoryOptionsFromProducts(window.catalogProducts); } catch (_) {}
          try { refreshDerivedFilterOptions(window.catalogProducts); } catch (_) {}

          // Colors/styles if present
          try {
            const colors = await INHDATA.getAll('colors');
            const shades = Array.from(new Set((colors || []).map(c => c.Color || c.color || c.Shade).filter(Boolean))).sort((a,b)=>a.localeCompare(b));
            setOptions(document.getElementById('catalog-shade'), shades, 'All Shades');
            window.catalogColors = colors || [];
          } catch (_) {}
          try {
            const styles = await INHDATA.getAll('styles');
            window.catalogStyles = styles || [];
          } catch (_) {}
        } catch (e) {
          console.warn('INHDATA initialization in productcatalog failed:', e.message);
        }
      });
    </script>
